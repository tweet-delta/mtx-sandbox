<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Route Checklist — Maintenance House Visit</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#2D5580">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Route Checklist">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root {
    --ground: #F2F4F6;
    --card: #FFFFFF;
    --ink: #1C2733;
    --muted: #5D6B7A;
    --line: #D9DFE6;
    --accent: #2D5580;
    --accent-ink: #FFFFFF;
    --done: #2E7D4F;
    --done-bg: #f1e6ed;
    --bad: #A63A2B;
    --bad-bg: #F7E9E6;
    --note: #8A5E10;
    --note-bg: #F6EDDA;
    --resident: #2D5580;
    --rs: #6A4B8A;
    --shared: #3E7A6A;
    --wrap: #8A5E10;
  }
  * { box-sizing: border-box; }
  html { background: var(--ground); }
  body {
    margin: 0;
    font-family: system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    line-height: 1.4;
  }
  .wrapper { max-width: 680px; margin: 0 auto; padding: 16px 14px 80px; }

  /* Sticky visit header */
  .visit {
    position: sticky; top: 0; z-index: 5;
    background: var(--ground);
    padding: 8px 0 10px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 14px;
  }
  .visit h1 { font-size: 1.05rem; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.01em; }
  .visit .fields { display: flex; gap: 8px; flex-wrap: wrap; }
  .visit input[type="text"], .visit input[type="date"] {
    font: inherit; font-size: 0.95rem;
    padding: 8px 10px;
    border: 1px solid var(--line); border-radius: 6px;
    background: var(--card); color: var(--ink);
  }
  .visit input[type="text"] { flex: 1 1 180px; min-width: 0; }
  .progress { margin-top: 10px; }
  .progress .bar {
    height: 6px; border-radius: 999px; background: var(--line); overflow: hidden;
  }
  .progress .fill {
    height: 100%; background: var(--done); width: 0%;
    transition: width 0.25s ease;
  }
  @media (prefers-reduced-motion: reduce) { .progress .fill { transition: none; } }
  .progress .text {
    font-size: 0.75rem; color: var(--muted); margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }

  /* Group labels */
  .group-label {
    font-size: 0.68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    margin: 20px 2px 8px;
  }
  .group-label.resident { color: var(--resident); }
  .group-label.rs { color: var(--rs); }
  .group-label.shared { color: var(--shared); }
  .group-label.wrap { color: var(--wrap); }

  /* Sections */
  details.section {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    margin-bottom: 8px;
  }
  details.section > summary {
    list-style: none;
    cursor: pointer;
    padding: 13px 14px;
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; font-size: 0.95rem;
    -webkit-tap-highlight-color: transparent;
  }
  details.section > summary::-webkit-details-marker { display: none; }
  details.section > summary:focus-visible { outline: 2px solid var(--ink); outline-offset: -2px; border-radius: 8px; }
  .chev { transition: transform 0.15s ease; color: var(--muted); flex: none; }
  details[open] .chev { transform: rotate(90deg); }
  @media (prefers-reduced-motion: reduce) { .chev { transition: none; } }
  .count {
    margin-left: auto;
    font-size: 0.78rem; font-weight: 600; color: var(--muted);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .count.complete { color: var(--done); }
  .count .flag { color: var(--bad); }

  .items { border-top: 1px solid var(--line); padding: 4px 0; }
  .item { padding: 6px 14px; }
  .item + .item { border-top: 1px solid #EEF1F4; }
  .item-row { display: flex; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
  .item label.tick {
    display: flex; align-items: flex-start; gap: 10px;
    flex: 1 1 auto; cursor: pointer; padding: 6px 0;
    font-size: 0.92rem;
  }
  .item input[type="checkbox"] {
    width: 22px; height: 22px; flex: none;
    accent-color: var(--done);
    margin: 0;
  }
  .item.done .qtext { color: var(--muted); }
  .item.flagged { background: var(--bad-bg); border-radius: 6px; }

  .qtext { flex: 1 1 auto; font-size: 0.92rem; padding: 6px 0; min-width: 160px; }

  .yn { display: flex; gap: 6px; flex: none; padding-top: 3px; }
  .yn-btn {
    font: inherit; font-size: 0.82rem; font-weight: 650;
    min-width: 48px; padding: 7px 12px;
    border: 1px solid var(--line); border-radius: 6px;
    background: var(--card); color: var(--muted);
    cursor: pointer;
  }
  .yn-btn.sel-good { background: var(--done); border-color: var(--done); color: #fff; }
  .yn-btn.sel-bad { background: var(--bad); border-color: var(--bad); color: #fff; }
  .yn-btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  .note-btn {
    font: inherit; font-size: 0.75rem; font-weight: 600;
    color: var(--muted); background: none;
    border: 1px solid var(--line); border-radius: 6px;
    padding: 6px 9px; cursor: pointer; flex: none;
    margin-top: 4px;
  }
  .note-btn.has-note { color: var(--note); background: var(--note-bg); border-color: transparent; }
  .note-btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  .item textarea {
    font: inherit; font-size: 0.88rem;
    width: 100%; margin: 4px 0 6px;
    border: 1px solid var(--line); border-radius: 6px;
    padding: 7px 9px; min-height: 44px; resize: vertical;
    background: #FFFDF5;
  }
  .item textarea.reason { border-color: var(--bad); background: #FFF9F7; }
  .reason-label {
    font-size: 0.72rem; font-weight: 700; color: var(--bad);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin: 2px 0;
  }

  /* Due-date badge on periodic jobs (e.g. yearly battery change) */
  .due {
    display: inline-flex; align-items: center; gap: 5px;
    margin: 2px 0 6px;
    font-size: 0.76rem; font-weight: 600;
    padding: 3px 9px; border-radius: 999px;
    background: #E7F0FA; color: var(--accent);
  }
  .due.ok { background: #E6F2EA; color: var(--done); }
  .due.over { background: var(--bad-bg); color: var(--bad); }
  .item.notdue { opacity: 0.72; }

  /* Date-tracked jobs: "Update date" button + the (revealed) date picker */
  .update-btn {
    font: inherit; font-size: 0.78rem; font-weight: 600;
    color: var(--accent); background: none;
    border: 1px solid var(--line); border-radius: 6px;
    padding: 6px 10px; cursor: pointer; flex: none; margin-top: 4px;
  }
  .update-btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  .item.dated.done .update-btn { color: var(--done); border-color: var(--done); }
  .date-field {
    font: inherit; font-size: 0.9rem; margin: 4px 0 2px;
    border: 1px solid var(--line); border-radius: 6px; padding: 7px 9px;
    background: var(--card); color: var(--ink);
  }

  /* Water-temp reading field, revealed when the box is checked */
  .temp-wrap { display: flex; align-items: center; gap: 8px; margin: 4px 0 2px; padding-left: 32px; }
  .temp-wrap label { font-size: 0.82rem; color: var(--muted); font-weight: 600; }
  .temp-wrap input {
    font: inherit; font-size: 1rem; width: 90px;
    border: 1px solid var(--line); border-radius: 6px; padding: 7px 9px;
    background: #FFFDF5; color: var(--ink);
  }

  /* Section / item N/A (e.g. no generator at this house) */
  .item.na .qtext { color: var(--muted); text-decoration: line-through; text-decoration-thickness: 1px; }
  .na-row { padding: 10px 14px 4px; }
  .na-btn {
    font: inherit; font-size: 0.82rem; font-weight: 600;
    width: 100%; padding: 9px 12px;
    border: 1px dashed var(--line); border-radius: 8px;
    background: none; color: var(--muted); cursor: pointer;
  }
  .na-btn.on { border-style: solid; border-color: var(--done); color: var(--done); background: #E6F2EA; }
  .na-btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  /* Up-front house picker (shown until a house is chosen) */
  .pick-house {
    background: var(--card); border: 1px solid var(--line); border-radius: 8px;
    padding: 14px; margin-bottom: 14px;
  }
  .pick-house h2 { font-size: 0.95rem; margin: 0 0 10px; }
  #pickSearch {
    font: inherit; font-size: 16px; /* 16px stops iOS zoom-on-focus */
    width: 100%; padding: 10px 12px; margin-bottom: 8px;
    border: 1px solid var(--line); border-radius: 8px;
    background: var(--ground); color: var(--ink);
  }
  .pick-list { display: flex; flex-direction: column; gap: 6px; max-height: 40vh; overflow-y: auto; }
  .pick-none { font-size: 0.85rem; color: var(--muted); margin: 6px 2px; }
  .pick-btn {
    font: inherit; font-size: 0.95rem; font-weight: 600; text-align: left;
    padding: 13px 12px; border: 1px solid var(--line); border-radius: 8px;
    background: var(--ground); color: var(--ink); cursor: pointer;
  }
  .pick-btn:hover { border-color: var(--accent); color: var(--accent); }
  .pick-btn:focus-visible, .pick-skip:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  .pick-skip {
    font: inherit; font-size: 0.78rem; color: var(--muted);
    background: none; border: none; cursor: pointer;
    margin-top: 10px; padding: 4px 0; text-decoration: underline;
  }

  .pick-all {
    font: inherit; font-size: 0.85rem; width: 100%; margin-top: 8px;
    padding: 10px 12px; border: 1px dashed var(--line); border-radius: 8px;
    background: none; color: var(--muted); cursor: pointer;
  }
  .pick-all:hover { border-color: var(--accent); color: var(--accent); }
  .pick-all:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  /* Phone-size layout: question gets the full line, Yes/No become two big
     side-by-side thumb targets on their own row, Note shrinks to its icon. */
  @media (max-width: 600px) {
    .item-row { flex-wrap: wrap; }
    .qtext { min-width: 0; flex: 1 1 60%; }
    .note-btn { order: 2; margin-top: 0; align-self: flex-start; }
    .note-word { display: none; }
    .note-btn { font-size: 0.9rem; padding: 6px 10px; }
    .yn { order: 3; flex: 1 1 100%; padding-top: 0; margin: 6px 0 2px; }
    .yn-btn { flex: 1 1 0; padding: 11px 0; font-size: 0.9rem; border-radius: 8px; }
    .wrapper { padding: 10px 10px 80px; }
    .visit h1 { font-size: 0.98rem; margin-bottom: 6px; }
    .visit input[type="text"], .visit input[type="date"] { font-size: 16px; } /* stops iOS zoom-on-focus */
  }

  /* Alarm counts — one row per level (Resident / RS), three fields across */
  .counts-body { padding: 12px 14px; border-top: 1px solid var(--line); }
  .count-group + .count-group { margin-top: 12px; }
  .count-group-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 700; margin-bottom: 6px; }
  .counts-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .count-field label { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 3px; }
  .count-field input {
    font: inherit; font-size: 1rem; width: 100%;
    padding: 8px 10px; border: 1px solid var(--line); border-radius: 6px;
    font-variant-numeric: tabular-nums;
  }

  /* Report */
  .report-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card); border-top: 1px solid var(--line);
    padding: 10px 14px;
    display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  }
  .report-bar button {
    font: inherit; font-weight: 600; font-size: 0.92rem;
    border-radius: 8px; padding: 11px 18px; cursor: pointer;
  }
  #openSurvey { background: var(--accent); color: var(--accent-ink); border: none; flex: 1 1 auto; max-width: 400px; }
  #openSurvey:hover { background: #244568; }
  #saveProgress { background: none; color: var(--accent); border: 1px solid var(--accent); }
  #saveProgress:hover { background: #EAF1F8; }
  #saveProgress:disabled { opacity: 0.6; cursor: default; }

  /* Transient status toast (Save progress feedback) */
  #toast {
    position: fixed; left: 50%; bottom: 74px; z-index: 60;
    transform: translateX(-50%) translateY(16px);
    background: var(--ink); color: #fff; max-width: 90vw;
    padding: 10px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 500;
    opacity: 0; pointer-events: none; transition: opacity 0.2s ease, transform 0.2s ease;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.ok { background: var(--done); }
  #toast.error { background: var(--bad); }
  @media (prefers-reduced-motion: reduce) { #toast { transition: opacity 0.2s ease; } }

  /* Survey modal (small popup window) */
  #surveyModal {
    border: none; border-radius: 12px; padding: 0;
    width: min(92vw, 560px); max-height: 88vh;
    background: var(--card); color: var(--ink);
    box-shadow: 0 12px 44px rgba(20, 30, 40, 0.28);
  }
  #surveyModal::backdrop { background: rgba(20, 30, 40, 0.45); }
  .modal-card { display: flex; flex-direction: column; max-height: 88vh; margin: 0; }
  .modal-head {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px; border-bottom: 1px solid var(--line);
  }
  .modal-head h2 { font-size: 1rem; margin: 0; flex: 1 1 auto; }
  .modal-x { background: none; border: none; font-size: 1.05rem; line-height: 1; color: var(--muted); cursor: pointer; padding: 4px 8px; }
  .modal-x:hover { color: var(--ink); }
  .modal-body { padding: 6px 16px 10px; overflow-y: auto; }
  .modal-field { padding: 9px 0; }
  .modal-field + .modal-field { border-top: 1px solid #EEF1F4; }
  .modal-field label { display: block; font-size: 0.86rem; font-weight: 600; margin-bottom: 5px; }
  .modal-field input, .modal-field textarea {
    font: inherit; font-size: 0.9rem; width: 100%;
    border: 1px solid var(--line); border-radius: 6px; padding: 7px 9px;
    background: var(--card); color: var(--ink); resize: vertical;
  }
  .modal-field.missing input, .modal-field.missing textarea { border-color: var(--bad); background: #FFF9F7; }
  .modal-foot {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-top: 1px solid var(--line);
  }
  .modal-msg { flex: 1 1 auto; font-size: 0.8rem; color: var(--muted); }
  .modal-msg.error { color: var(--bad); font-weight: 600; }
  .modal-msg.ok { color: var(--done); font-weight: 600; }
  .send-btn {
    font: inherit; font-weight: 600; font-size: 0.92rem;
    border: none; border-radius: 8px; padding: 11px 18px;
    background: var(--accent); color: var(--accent-ink); cursor: pointer; flex: none;
  }
  .send-btn:hover { background: #244568; }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .report-bar button:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  /* House picker sidebar */
  .titlerow { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .titlerow h1 { margin: 0; }
  .menu-btn {
    font: inherit; font-size: 0.82rem; font-weight: 600;
    border: 1px solid var(--line); border-radius: 6px;
    background: var(--card); color: var(--ink);
    padding: 7px 11px; cursor: pointer; flex: none;
  }
  .menu-btn:hover { border-color: var(--muted); }
  #sideBackdrop {
    position: fixed; inset: 0; background: rgba(20, 30, 40, 0.35); z-index: 19;
  }
  #sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 20;
    width: min(85vw, 300px);
    background: var(--card); border-right: 1px solid var(--line);
    padding: 14px; overflow-y: auto;
    box-shadow: 0 0 30px rgba(20, 30, 40, 0.2);
  }
  #sidebar h2 { font-size: 0.95rem; margin: 0 0 10px; display: flex; align-items: center; gap: 4px; }
  /* Spread the search and close buttons to opposite ends so they can't be
     tapped by accident; the centered title fills the space between them. */
  .sidebar-title { flex: 1; text-align: center; }
  .sidebar-search-toggle {
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-size: 1.05rem; line-height: 1;
    min-width: 44px; min-height: 44px; padding: 4px 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .sidebar-search-toggle:hover { color: var(--ink); }
  .sidebar-search-toggle[aria-expanded="true"] { color: var(--ink); }
  #sidebar .modal-x { min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
  #houseSearch {
    font: inherit; font-size: 0.9rem; width: 100%;
    border: 1px solid var(--line); border-radius: 6px;
    padding: 8px 10px; margin-bottom: 10px;
  }
  .house-btn {
    display: block; width: 100%; text-align: left;
    font: inherit; font-size: 0.9rem; font-weight: 600;
    background: none; border: 1px solid transparent; border-radius: 6px;
    padding: 9px 10px; cursor: pointer; color: var(--ink);
  }
  .house-btn:hover { background: var(--ground); }
  .house-btn.sel { background: var(--accent); color: var(--accent-ink); }
  .house-btn.none { color: var(--muted); font-weight: 500; }
  #houseInfo { margin-top: 14px; border-top: 1px solid var(--line); padding-top: 10px; }
  #houseInfo h3 {
    font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted); margin: 0 0 8px;
  }
  .info-item { font-size: 0.84rem; padding: 5px 0; border-top: 1px solid #EEF1F4; }
  .info-item:first-of-type { border-top: none; }
  .info-item b { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  .info-item.code b { color: var(--note); }

  /* House-specific note under a checklist item */
  .house-note {
    font-size: 0.8rem; color: var(--accent);
    background: #EDF3F9; border-radius: 6px;
    padding: 6px 9px; margin: 2px 0 6px;
  }

  /* Login gate */
  body.locked { overflow: hidden; }
  #authGate {
    position: fixed; inset: 0; z-index: 100;
    background: var(--ground);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  #authGate[hidden] { display: none; }
  .auth-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    box-shadow: 0 12px 44px rgba(20, 30, 40, 0.12);
    /* 100% = the gate's inner width (its padding already keeps us off the
       screen edges); 94vw could overflow on narrow phones. */
    padding: 24px 22px; width: min(100%, 380px);
  }
  .auth-card h1 { font-size: 1.15rem; margin: 0 0 4px; }
  .auth-sub { font-size: 0.9rem; color: var(--muted); margin: 0 0 16px; }
  .auth-card label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
  .auth-card input {
    font: inherit; font-size: 1rem; width: 100%;
    padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px;
    background: var(--card); color: var(--ink); margin-bottom: 12px;
  }
  .auth-card button {
    font: inherit; font-weight: 600; font-size: 0.95rem;
    width: 100%; padding: 11px 16px; border: none; border-radius: 8px;
    background: var(--accent); color: var(--accent-ink); cursor: pointer;
  }
  .auth-card button:hover { background: #244568; }
  .auth-msg { font-size: 0.85rem; margin: 12px 0 0; min-height: 1.2em; }
  .auth-msg.ok { color: var(--done); }
  .auth-msg.error { color: var(--bad); }
  /* Account row in the houses sidebar */
  #account {
    margin-top: 14px; border-top: 1px solid var(--line); padding-top: 10px;
    font-size: 0.82rem; color: var(--muted);
  }
  #account button {
    font: inherit; font-size: 0.8rem; font-weight: 600;
    margin-top: 6px; padding: 6px 10px;
    border: 1px solid var(--line); border-radius: 6px;
    background: var(--card); color: var(--ink); cursor: pointer;
  }
  .auth-card button.auth-link {
    background: none; color: var(--accent);
    width: auto; padding: 0; margin-top: 12px;
    font-size: 0.82rem; font-weight: 500;
    text-decoration: underline; display: block;
  }
  #account > div:first-child { color: var(--ink); font-weight: 600; }
  #account .setpw { margin: 8px 0; }
  #account .setpw summary { cursor: pointer; font-size: 0.8rem; color: var(--accent); }
  #account .setpw input {
    font: inherit; font-size: 0.9rem; width: 100%;
    padding: 7px 9px; border: 1px solid var(--line); border-radius: 6px; margin: 6px 0;
  }
  .pw-msg { display: block; font-size: 0.78rem; margin-top: 4px; }
  .pw-msg.ok { color: var(--done); }
  .pw-msg.error { color: var(--bad); }

  /* ---- Screens (Home / Visit / Continue / Notes) ---- */
  /* The checklist is the "visit" screen: its wrapper + bottom bar only show there. */
  body:not([data-screen="visit"]) .wrapper,
  body:not([data-screen="visit"]) .report-bar { display: none; }
  .screen { max-width: 680px; margin: 0 auto; padding: 16px 14px 40px; }
  body:not([data-screen="home"])     #homeScreen,
  body:not([data-screen="continue"]) #continueScreen,
  body:not([data-screen="routes"])   #routesScreen,
  body:not([data-screen="notes"])    #notesScreen { display: none; }

  #previewBanner {
