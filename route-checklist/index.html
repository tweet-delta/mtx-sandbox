<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Route Checklist — Maintenance House Visit</title>
<style>
  :root {
    --ground: #F2F4F6;
    --card: #FFFFFF;
    --ink: #1C2733;
    --muted: #5D6B7A;
    --line: #D9DFE6;
    --accent: #2D5580;
    --accent-ink: #FFFFFF;
    --done: #2E7D4F;
    --done-bg: #E6F1EA;
    --bad: #A63A2B;
    --bad-bg: #F7E9E6;
    --note: #8A5E10;
    --note-bg: #F6EDDA;
    --resident: #2D5580;
    --rs: #6A4B8A;
    --shared: #3E7A6A;
    --wrap: #8A5E10;
  }
  * { box-sizing: border-box; }
  html { background: var(--ground); }
  body {
    margin: 0;
    font-family: system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    line-height: 1.4;
  }
  .wrapper { max-width: 680px; margin: 0 auto; padding: 16px 14px 80px; }

  /* Sticky visit header */
  .visit {
    position: sticky; top: 0; z-index: 5;
    background: var(--ground);
    padding: 8px 0 10px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 14px;
  }
  .visit h1 { font-size: 1.05rem; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.01em; }
  .visit .fields { display: flex; gap: 8px; flex-wrap: wrap; }
  .visit input[type="text"], .visit input[type="date"] {
    font: inherit; font-size: 0.95rem;
    padding: 8px 10px;
    border: 1px solid var(--line); border-radius: 6px;
    background: var(--card); color: var(--ink);
  }
  .visit input[type="text"] { flex: 1 1 180px; min-width: 0; }
  .progress { margin-top: 10px; }
  .progress .bar {
    height: 6px; border-radius: 999px; background: var(--line); overflow: hidden;
  }
  .progress .fill {
    height: 100%; background: var(--done); width: 0%;
    transition: width 0.25s ease;
  }
  @media (prefers-reduced-motion: reduce) { .progress .fill { transition: none; } }
  .progress .text {
    font-size: 0.75rem; color: var(--muted); margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }

  /* Group labels */
  .group-label {
    font-size: 0.68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    margin: 20px 2px 8px;
  }
  .group-label.resident { color: var(--resident); }
  .group-label.rs { color: var(--rs); }
  .group-label.shared { color: var(--shared); }
  .group-label.wrap { color: var(--wrap); }

  /* Sections */
  details.section {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    margin-bottom: 8px;
  }
  details.section > summary {
    list-style: none;
    cursor: pointer;
    padding: 13px 14px;
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; font-size: 0.95rem;
    -webkit-tap-highlight-color: transparent;
  }
  details.section > summary::-webkit-details-marker { display: none; }
  details.section > summary:focus-visible { outline: 2px solid var(--ink); outline-offset: -2px; border-radius: 8px; }
  .chev { transition: transform 0.15s ease; color: var(--muted); flex: none; }
  details[open] .chev { transform: rotate(90deg); }
  @media (prefers-reduced-motion: reduce) { .chev { transition: none; } }
  .count {
    margin-left: auto;
    font-size: 0.78rem; font-weight: 600; color: var(--muted);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .count.complete { color: var(--done); }
  .count .flag { color: var(--bad); }

  .items { border-top: 1px solid var(--line); padding: 4px 0; }
  .item { padding: 6px 14px; }
  .item + .item { border-top: 1px solid #EEF1F4; }
  .item-row { display: flex; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
  .item label.tick {
    display: flex; align-items: flex-start; gap: 10px;
    flex: 1 1 auto; cursor: pointer; padding: 6px 0;
    font-size: 0.92rem;
  }
  .item input[type="checkbox"] {
    width: 22px; height: 22px; flex: none;
    accent-color: var(--done);
    margin: 0;
  }
  .item.done .qtext { color: var(--muted); }
  .item.flagged { background: var(--bad-bg); border-radius: 6px; }

  .qtext { flex: 1 1 auto; font-size: 0.92rem; padding: 6px 0; min-width: 160px; }

  .yn { display: flex; gap: 6px; flex: none; padding-top: 3px; }
  .yn-btn {
    font: inherit; font-size: 0.82rem; font-weight: 650;
    min-width: 48px; padding: 7px 12px;
    border: 1px solid var(--line); border-radius: 6px;
    background: var(--card); color: var(--muted);
    cursor: pointer;
  }
  .yn-btn.sel-good { background: var(--done); border-color: var(--done); color: #fff; }
  .yn-btn.sel-bad { background: var(--bad); border-color: var(--bad); color: #fff; }
  .yn-btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  .note-btn {
    font: inherit; font-size: 0.75rem; font-weight: 600;
    color: var(--muted); background: none;
    border: 1px solid var(--line); border-radius: 6px;
    padding: 6px 9px; cursor: pointer; flex: none;
    margin-top: 4px;
  }
  .note-btn.has-note { color: var(--note); background: var(--note-bg); border-color: transparent; }
  .note-btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  .item textarea {
    font: inherit; font-size: 0.88rem;
    width: 100%; margin: 4px 0 6px;
    border: 1px solid var(--line); border-radius: 6px;
    padding: 7px 9px; min-height: 44px; resize: vertical;
    background: #FFFDF5;
  }
  .item textarea.reason { border-color: var(--bad); background: #FFF9F7; }
  .reason-label {
    font-size: 0.72rem; font-weight: 700; color: var(--bad);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin: 2px 0;
  }

  /* Alarm counts */
  .counts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px 14px; border-top: 1px solid var(--line); }
  .count-field label { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 3px; }
  .count-field input {
    font: inherit; font-size: 1rem; width: 100%;
    padding: 8px 10px; border: 1px solid var(--line); border-radius: 6px;
    font-variant-numeric: tabular-nums;
  }

  /* Report */
  .report-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card); border-top: 1px solid var(--line);
    padding: 10px 14px;
    display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  }
  .report-bar button {
    font: inherit; font-weight: 600; font-size: 0.92rem;
    border-radius: 8px; padding: 11px 18px; cursor: pointer;
  }
  #openSurvey { background: var(--accent); color: var(--accent-ink); border: none; flex: 1 1 auto; max-width: 400px; }
  #openSurvey:hover { background: #244568; }
  #newVisit { background: none; color: var(--muted); border: 1px solid var(--line); }
  #newVisit:hover { color: var(--ink); border-color: var(--muted); }

  /* Survey modal (small popup window) */
  #surveyModal {
    border: none; border-radius: 12px; padding: 0;
    width: min(92vw, 560px); max-height: 88vh;
    background: var(--card); color: var(--ink);
    box-shadow: 0 12px 44px rgba(20, 30, 40, 0.28);
  }
  #surveyModal::backdrop { background: rgba(20, 30, 40, 0.45); }
  .modal-card { display: flex; flex-direction: column; max-height: 88vh; margin: 0; }
  .modal-head {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px; border-bottom: 1px solid var(--line);
  }
  .modal-head h2 { font-size: 1rem; margin: 0; flex: 1 1 auto; }
  .modal-x { background: none; border: none; font-size: 1.05rem; line-height: 1; color: var(--muted); cursor: pointer; padding: 4px 8px; }
  .modal-x:hover { color: var(--ink); }
  .modal-body { padding: 6px 16px 10px; overflow-y: auto; }
  .modal-field { padding: 9px 0; }
  .modal-field + .modal-field { border-top: 1px solid #EEF1F4; }
  .modal-field label { display: block; font-size: 0.86rem; font-weight: 600; margin-bottom: 5px; }
  .modal-field input, .modal-field textarea {
    font: inherit; font-size: 0.9rem; width: 100%;
    border: 1px solid var(--line); border-radius: 6px; padding: 7px 9px;
    background: var(--card); color: var(--ink); resize: vertical;
  }
  .modal-field.missing input, .modal-field.missing textarea { border-color: var(--bad); background: #FFF9F7; }
  .modal-foot {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-top: 1px solid var(--line);
  }
  .modal-msg { flex: 1 1 auto; font-size: 0.8rem; color: var(--muted); }
  .modal-msg.error { color: var(--bad); font-weight: 600; }
  .modal-msg.ok { color: var(--done); font-weight: 600; }
  .send-btn {
    font: inherit; font-weight: 600; font-size: 0.92rem;
    border: none; border-radius: 8px; padding: 11px 18px;
    background: var(--accent); color: var(--accent-ink); cursor: pointer; flex: none;
  }
  .send-btn:hover { background: #244568; }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .report-bar button:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  /* House picker sidebar */
  .titlerow { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .titlerow h1 { margin: 0; }
  .menu-btn {
    font: inherit; font-size: 0.82rem; font-weight: 600;
    border: 1px solid var(--line); border-radius: 6px;
    background: var(--card); color: var(--ink);
    padding: 7px 11px; cursor: pointer; flex: none;
  }
  .menu-btn:hover { border-color: var(--muted); }
  #sideBackdrop {
    position: fixed; inset: 0; background: rgba(20, 30, 40, 0.35); z-index: 19;
  }
  #sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 20;
    width: min(85vw, 300px);
    background: var(--card); border-right: 1px solid var(--line);
    padding: 14px; overflow-y: auto;
    box-shadow: 0 0 30px rgba(20, 30, 40, 0.2);
  }
  #sidebar h2 { font-size: 0.95rem; margin: 0 0 10px; display: flex; align-items: center; }
  #sidebar .modal-x { margin-left: auto; }
  #houseSearch {
    font: inherit; font-size: 0.9rem; width: 100%;
    border: 1px solid var(--line); border-radius: 6px;
    padding: 8px 10px; margin-bottom: 10px;
  }
  .house-btn {
    display: block; width: 100%; text-align: left;
    font: inherit; font-size: 0.9rem; font-weight: 600;
    background: none; border: 1px solid transparent; border-radius: 6px;
    padding: 9px 10px; cursor: pointer; color: var(--ink);
  }
  .house-btn:hover { background: var(--ground); }
  .house-btn.sel { background: var(--accent); color: var(--accent-ink); }
  .house-btn.none { color: var(--muted); font-weight: 500; }
  #houseInfo { margin-top: 14px; border-top: 1px solid var(--line); padding-top: 10px; }
  #houseInfo h3 {
    font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted); margin: 0 0 8px;
  }
  .info-item { font-size: 0.84rem; padding: 5px 0; border-top: 1px solid #EEF1F4; }
  .info-item:first-of-type { border-top: none; }
  .info-item b { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  .info-item.code b { color: var(--note); }

  /* House-specific note under a checklist item */
  .house-note {
    font-size: 0.8rem; color: var(--accent);
    background: #EDF3F9; border-radius: 6px;
    padding: 6px 9px; margin: 2px 0 6px;
  }
</style>

<div class="wrapper">
  <div class="visit">
    <div class="titlerow">
      <button id="menuBtn" class="menu-btn" aria-label="Pick house">☰ Houses</button>
      <h1>Maintenance House Visit</h1>
    </div>
    <div class="fields">
      <input type="text" id="name" placeholder="Your name" aria-label="Your name">
      <input type="text" id="house" placeholder="House" aria-label="House name">
      <input type="date" id="date" aria-label="Visit date">
    </div>
    <div class="progress">
      <div class="bar"><div class="fill" id="fill"></div></div>
      <div class="text" id="progressText"></div>
    </div>
  </div>

  <div id="app"></div>
</div>

<dialog id="surveyModal" aria-label="Maintenance House Visit Survey">
  <div class="modal-card">
    <div class="modal-head">
      <h2>Visit Survey</h2>
      <button type="button" class="modal-x" id="surveyClose" aria-label="Close">✕</button>
    </div>
    <div class="modal-body" id="surveyBody"></div>
    <div class="modal-foot">
      <span class="modal-msg" id="surveyMsg"></span>
      <button type="button" id="surveySend" class="send-btn">Save &amp; Send</button>
    </div>
  </div>
</dialog>

<div class="report-bar">
  <button id="openSurvey">Visit survey</button>
  <button id="newVisit">New visit</button>
</div>

<div id="sideBackdrop" hidden></div>
<aside id="sidebar" hidden aria-label="House picker">
  <h2>Houses <button type="button" class="modal-x" id="sidebarClose" aria-label="Close">✕</button></h2>
  <input type="search" id="houseSearch" placeholder="Search houses…" aria-label="Search houses">
  <div id="houseList"></div>
  <div id="houseInfo"></div>
</aside>

<!-- House data: house-data.js is the shared roster; house-codes.local.js
     holds door codes and stays on-device (gitignored, optional). -->
<script src="house-data.js"></script>
<script src="house-codes.local.js"></script>

<script>
  // Checklist data. Two kinds of entries:
  //   "plain string"            → action item, simple checkbox
  //   { q: "...", bad: "yes" }  → yes/no question; the `bad` answer
  //                               reveals a required "reason why" box.
  //     bad: "yes" → "anything wrong?" questions (Yes = problem)
  //     bad: "no"  → "working properly?" questions (No = problem)
  const GROUPS = [
    { label: "Whole House", cls: "shared", sections: [
      { title: "All Areas", items: [
        "Change all med lock batteries",
        "Change water alarm batteries (yearly)",
        "Test CO2 detectors (within 10' of all bedrooms) — how many?",
        "Check dates on all smoke & CO2 detectors",
        { q: "Fixture bulbs OK (60W soft white LED) & fixtures secure?", bad: "no" },
        { q: "Any damaged switches / receptacles?", bad: "yes" },
        { q: "Any wall damage needing patching / painting?", bad: "yes" },
        "Check all swings for wear — replace any worn parts",
        { q: "Home has both toilet & sink plungers?", bad: "no" },
        { q: "Any water damage? (walls, ceilings, sink & bath areas)", bad: "yes" },
        { q: "Attic ventilation OK? (exhaust vents attached, no water damage)", bad: "no" },
      ]},
    ]},
    { label: "Resident Level", cls: "resident", sections: [
      { title: "Kitchen", items: [
        "Check water alarms — under sink & dishwasher",
        "Check faucet & sprayer",
        { q: "Any water damage or new leaks?", bad: "yes" },
        "Run Dishwasher Magic & fill Jet Dry in dishwasher",
        "Check GFCIs for proper function",
        { q: "Cabinets & drawers working properly?", bad: "no" },
        "Vacuum refrigerator coils (front/back)",
        "Sharpen knives",
        { q: "Fire extinguisher up to date and accessible?", bad: "no" },
        "Check fire stops / kitchen fire extinguishers",
        { q: "Felt protectors on table & chair legs? (laminate floors)", bad: "no" },
        { q: "Garbage disposal operating correctly? (run disposal cleaner)", bad: "no" },
        "Run cleaning tablets in HE washers",
      ]},
      { title: "Bathroom #1", items: [
        { q: "Water temp at or below 110°? (record highest temp)", bad: "no" },
        "Check water alarms (toilet, sink & tub)",
        { q: "Faucet & showerhead working properly?", bad: "no" },
        "Check hoses under tub for leaks / moisture / mold",
        "Renew failing caulk",
        "Clean exhaust fan",
        "Check emergency bathroom alarms",
        { q: "Any new water leaks / damage?", bad: "yes" },
      ]},
      { title: "Bathroom #2", items: [
        { q: "Water temp at or below 110°? (record highest temp)", bad: "no" },
        "Check water alarms (toilet, sink & tub)",
        { q: "Faucet & showerhead working properly?", bad: "no" },
        "Check hoses under tub for leaks / moisture / mold",
        "Renew failing caulk",
        "Clean exhaust fan",
        "Check emergency bathroom alarms",
        { q: "Any new water leaks / damage?", bad: "yes" },
      ]},
      { title: "Bedrooms", items: [
        { q: "Bed rails tight & functioning?", bad: "no" },
        { q: "Door transitions in good shape?", bad: "no" },
        { q: "Windows functioning properly?", bad: "no" },
        { q: "Closet doors functioning properly?", bad: "no" },
        { q: "Doors open / close properly?", bad: "no" },
      ]},
    ]},
    { label: "RS Unit", cls: "rs", sections: [
      { title: "Kitchen", items: [
        "Check water alarms — under sink & dishwasher",
        "Check faucet & sprayer for proper operation",
        { q: "Any water damage or new leaks?", bad: "yes" },
        "Renew failing caulk (sinks, backsplashes, etc.)",
        "Check GFCIs for proper function",
        { q: "Cabinets & drawers working properly?", bad: "no" },
        "Vacuum refrigerator coils (front/back)",
        { q: "Felt protectors on table & chair legs? (laminate floors)", bad: "no" },
      ]},
      { title: "Bathroom", items: [
        "Check water alarms (toilet, sink & tub)",
        { q: "Faucet & showerhead working properly?", bad: "no" },
        "Renew failing caulk",
        "Clean exhaust fan",
        { q: "Any new water leaks / damage?", bad: "yes" },
      ]},
    ]},
    { label: "Shared Spaces", cls: "shared", sections: [
      { title: "Mechanical Room", items: [
        { q: "Area free of clutter?", bad: "no" },
        { q: "Gas & water shutoffs clearly identified?", bad: "no" },
        "Check water alarms (water heater, softener, washer)",
        { q: "Any holes / leaks in duct work or stove pipe?", bad: "yes" },
        "Change furnace filter (4\" ≈ 90 days, 1\" ≈ 30 days)",
        "Check furnace dampers for seasonal adjustment",
        "Clean air exchanger — clean pre-filters",
        "Check water softener salt level & educate RS",
        { q: "Any basement moisture / window condensation?", bad: "yes" },
        "Lift sump pump float, verify operation (lower level & outdoor egress windows)",
      ]},
      { title: "Common Areas", items: [
        { q: "Any water damage or new leaks?", bad: "yes" },
        "Check spring hinges & door sweeps",
        "Check doorknobs, hinges & latches for tightness",
        { q: "All windows open / close properly?", bad: "no" },
        { q: "Fire extinguisher up to date and accessible?", bad: "no" },
      ]},
      { title: "Outside", items: [
        "Walk around house — paint / siding issues; fix or make a MTX ticket",
        { q: "Downspouts & extensions attached, not plugged or dented?", bad: "no" },
        { q: "Landscape drains away from house, no sinkholes?", bad: "no" },
        "If gutters need cleaning / repair, create a ticket",
        "Light fixtures working — change bulbs",
        { q: "Sidewalks / driveway free of trip & fall hazards?", bad: "no" },
        "Clean A/C coils",
        "Clean all dryer vents",
        "Check brick and windows — make needed repairs",
        "Clean front of house of dirt / cobwebs / debris",
        "Clear sidewalks / driveway of snow & ice",
        { q: "Roof coils secure & operational? GFCI switch operational?", bad: "no" },
        { q: "Snowblower / lawnmower starts properly?", bad: "no" },
        "Drive house vehicle — notify RS of maintenance issues",
        "Clean Q-Straint tracks — check fire extinguisher",
      ]},
      { title: "Generator", items: [
        "Check oil & filter",
        "Start & run generator for 10 minutes",
        "Test 15 & 20 amp receptacles with lamp / voltmeter",
        "Pour generator gas into MTX or house van",
        "Refill generator gas cans with new gas",
      ]},
      { title: "Maintenance Cabinet Stock", items: [
        "Wireless doorbell",
        "50' extension cord",
        "Door alarm (sensors)",
        "Mouse / ant traps",
        "Hinges (house specific)",
        "Duct tape",
        "Toilet seats",
        "Nail / screw kit",
        "Universal toilet handle",
        "Shower head & holder",
        "Toilet flapper (house size specific)",
        "Star nuts (lawnmower / snowblower)",
        "Toilet valve",
        "Tool kit",
        "Closet hardware (house specific)",
        "Cover plates",
        "Door knobs",
        "Specialty bulbs",
      ]},
    ]},
    { label: "Visit Wrap-Up", cls: "wrap", sections: [
      { title: "Before You Leave", items: [
        "Check website for requests — update ones assigned to you",
        "Try to complete requests not assigned to you — request updates from others",
        "Email urgent issues to Steve",
      ]},
    ]},
  ];

  const COUNTS = [
    { id: "res-water", label: "Resident water alarms" },
    { id: "res-co2",   label: "Resident CO2 alarms" },
    { id: "rs-water",  label: "RS water alarms" },
    { id: "rs-co2",    label: "RS CO2 alarms" },
  ];

  // End-of-visit survey (submitted after every house visit). Fields start
  // BLANK. Where a checklist item relates to a question, surveySuggestions()
  // supplies an editable suggested answer derived from the checklist; the rest
  // stay blank for staff to fill in. Name / Date / House come from the header.
  const SURVEY = [
    { id: "cars",   q: "Were there cars parked on the street? If so, how many?" },
    { id: "snow",   q: "Was the driveway and sidewalks free of snow/ice? If no, please provide details (N/A if not correct season)" },
    { id: "lawn",   q: "Was the lawn mowed? If no, please provide details (N/A if not correct season)" },
    { id: "yard",   q: "Was the yard free from weeds and other debris (toys, dog droppings, etc)? If no, please provide details" },
    { id: "livein", q: "Live-In Space Condition (Please provide details if there are concerns)" },
    { id: "reach",  q: "Was it easy to get ahold of the live-in to let you into the live-in space? (If no, please provide details i.e. you had to call multiple times, etc)" },
    { id: "other",  q: "Any other concerns or positives?" },
  ];

  // Find a checklist item's saved state by section title + a substring of its
  // question text. Returns {} if not found or unanswered.
  function findItemState(sectionTitle, qIncludes) {
    const s = load();
    let res = {};
    GROUPS.forEach((group, g) => group.sections.forEach((section, sec) => {
      if (section.title !== sectionTitle) return;
      section.items.forEach((item, i) => {
        if (isYN(item) && item.q.indexOf(qIncludes) !== -1) res = s.items[itemId(g, sec, i)] || {};
      });
    }));
    return res;
  }

  // Suggested survey answers derived from the checklist. Only questions with a
  // related, answered checklist item get a suggestion; the rest stay blank.
  function surveySuggestions() {
    const s = load();
    const sug = {};
    const flags = [], rsFlags = [];
    GROUPS.forEach((group, g) => group.sections.forEach((section, sec) => {
      section.items.forEach((item, i) => {
        if (!isYN(item)) return;
        const st = s.items[itemId(g, sec, i)];
        if (st && st.answer === item.bad) {
          const entry = item.q + (st.note ? " — " + st.note : "");
          flags.push(entry);
          if (group.label === "RS Unit") rsFlags.push(entry);
        }
      });
    }));
    // Snow/ice ← Outside "Sidewalks / driveway free of trip & fall hazards?"
    const hazard = findItemState("Outside", "Sidewalks / driveway free of trip");
    if (hazard.answer === "yes") sug.snow = "Yes";
    else if (hazard.answer === "no") sug.snow = "No" + (hazard.note ? " — " + hazard.note : "");
    // Live-in space condition ← flagged RS Unit items
    if (rsFlags.length) sug.livein = "Concerns: " + rsFlags.join("; ");
    // Other concerns ← every flagged issue on the checklist
    if (flags.length) sug.other = "From checklist:\n" + flags.map(f => "• " + f).join("\n");
    return sug;
  }

  // ---- House-specific tailoring (data in house-data.js / house-codes.local.js) ----
  const ALL_HOUSES = typeof HOUSES !== "undefined" ? HOUSES : [];
  const ALL_CODES = typeof HOUSE_CODES !== "undefined" ? HOUSE_CODES : {};

  // Connects checklist items (by text match) to house data:
  //   note — key into house.notes, shown inline under the item.
  //   flag — key into house.equipment; false hides the item for that house.
  const NOTE_RULES = [
    { match: /fire extinguisher/i,      note: "fireExtinguishers" },
    { match: /furnace filter/i,         note: "furnaceFilter" },
    { match: /refrigerator coils/i,     note: "fridgeCoils" },
    { match: /water softener/i,         note: "waterSoftener", flag: "waterSoftener" },
    { match: /gas & water shutoffs/i,   note: "shutoffs" },
    { match: /sharpen knives/i,         note: "knives" },
    { match: /med lock/i,               note: "medLock" },
    { match: /attic ventilation/i,      note: "atticAccess" },
    { match: /dryer vents/i,            note: "dryerVents" },
    { match: /roof coils/i,             flag: "roofCoils" },
    { match: /sump pump/i,              flag: "sumpPump" },
    { match: /garbage disposal/i,       flag: "garbageDisposal" },
    { match: /HE washers/i,             flag: "frontLoadWashers" },
    { match: /air exchanger/i,          flag: "airExchanger" },
  ];
  // Whole sections hidden when the house lacks the equipment.
  const SECTION_FLAGS = { "Generator": "generator" };

  function currentHouse() {
    const name = (load().house || "").trim().toLowerCase();
    if (!name) return null;
    return ALL_HOUSES.find(h => h.name.toLowerCase() === name) || null;
  }

  const STORE_KEY = "route-checklist-v2";
  // Route person's name persists across visits (same person each time).
  const NAME_KEY = "route-checklist-name";
  function loadName() { try { return localStorage.getItem(NAME_KEY) || ""; } catch { return ""; } }
  function saveName(n) { try { localStorage.setItem(NAME_KEY, n); } catch {} }
  let memory = null;
  function load() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || blank(); }
    catch { return memory || blank(); }
  }
  function save(s) {
    memory = s;
    try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch {}
  }
  function blank() {
    return { house: "", date: new Date().toISOString().slice(0, 10), items: {}, counts: {}, survey: {} };
  }

  function itemId(g, s, i) { return `g${g}s${s}i${i}`; }
  function isYN(item) { return typeof item === "object"; }
  function itemLabel(item) { return isYN(item) ? item.q : item; }

  function build() {
    const app = document.getElementById("app");
    const house = currentHouse();
    let html = "";
    GROUPS.forEach((group, g) => {
      html += `<div class="group-label ${group.cls}">${group.label}</div>`;
      group.sections.forEach((section, s) => {
        // Hide whole sections for equipment the selected house doesn't have.
        const secFlag = SECTION_FLAGS[section.title];
        if (house && secFlag && house.equipment && house.equipment[secFlag] === false) return;
        html += `<details class="section" data-g="${g}" data-s="${s}">
          <summary><svg class="chev" width="12" height="12" viewBox="0 0 12 12" aria-hidden="true"><path d="M4 2l4 4-4 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>${section.title}<span class="count" data-count></span></summary>
          <div class="items">`;
        section.items.forEach((item, i) => {
          const id = itemId(g, s, i);
          const label = itemLabel(item);
          const safeLabel = label.replace(/"/g, "&quot;");
          // House tailoring: skip items for missing equipment; collect notes.
          let houseNote = "";
          if (house) {
            const rules = NOTE_RULES.filter(r => r.match.test(label));
            if (rules.some(r => r.flag && house.equipment && house.equipment[r.flag] === false)) return;
            const texts = rules.map(r => r.note && house.notes && house.notes[r.note]).filter(Boolean);
            if (texts.length) houseNote = `<div class="house-note">📍 ${texts.join(" · ").replace(/</g, "&lt;")}</div>`;
          }
          if (isYN(item)) {
            html += `<div class="item" data-id="${id}" data-bad="${item.bad}">
              <div class="item-row">
                <span class="qtext">${item.q}</span>
                <span class="yn" role="group" aria-label="${safeLabel}">
                  <button class="yn-btn" data-yn="${id}" data-val="yes">Yes</button>
                  <button class="yn-btn" data-yn="${id}" data-val="no">No</button>
                </span>
                <button class="note-btn" data-note-btn="${id}" aria-label="Add note for: ${safeLabel}">Note</button>
              </div>
              ${houseNote}
              <div class="reason-label" data-reason-label="${id}" hidden>Reason / what needs follow-up</div>
              <textarea data-note="${id}" placeholder="Comment / issue found…" hidden></textarea>
            </div>`;
          } else {
            html += `<div class="item" data-id="${id}">
              <div class="item-row">
                <label class="tick"><input type="checkbox" data-check="${id}"><span class="qtext">${item}</span></label>
                <button class="note-btn" data-note-btn="${id}" aria-label="Add note for: ${safeLabel}">Note</button>
              </div>
              ${houseNote}
              <textarea data-note="${id}" placeholder="Comment / issue found…" hidden></textarea>
            </div>`;
          }
        });
        html += `</div></details>`;
        if (group.label === "Shared Spaces" && section.title === "Common Areas") {
          html += `<details class="section" id="alarmCounts" open>
            <summary><svg class="chev" width="12" height="12" viewBox="0 0 12 12" aria-hidden="true"><path d="M4 2l4 4-4 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Alarm Counts<span class="count" data-static></span></summary>
            <div class="counts-grid">${COUNTS.map(c =>
              `<div class="count-field"><label for="cnt-${c.id}">${c.label}</label>
               <input id="cnt-${c.id}" type="number" min="0" inputmode="numeric" data-cnt="${c.id}"></div>`).join("")}
            </div></details>`;
        }
      });
    });
    app.innerHTML = html;
  }

  // Reflect one yes/no item's answer in its buttons + reason box.
  function paintYN(id, answer) {
    const itemEl = document.querySelector(`.item[data-id="${id}"]`);
    if (!itemEl) return;
    const bad = itemEl.dataset.bad;
    const isBad = answer && answer === bad;
    itemEl.querySelectorAll(`[data-yn="${id}"]`).forEach(b => {
      const sel = answer === b.dataset.val;
      b.classList.toggle("sel-good", sel && !isBad);
      b.classList.toggle("sel-bad", sel && isBad);
      b.setAttribute("aria-pressed", sel ? "true" : "false");
    });
    itemEl.classList.toggle("flagged", !!isBad);
    itemEl.classList.toggle("done", !!answer && !isBad);
    const ta = itemEl.querySelector(`[data-note="${id}"]`);
    const lbl = itemEl.querySelector(`[data-reason-label="${id}"]`);
    if (isBad) {
      ta.hidden = false;
      ta.classList.add("reason");
      ta.placeholder = "What's wrong? What needs to happen?";
      lbl.hidden = false;
    } else {
      ta.classList.remove("reason");
      ta.placeholder = "Comment / issue found…";
      lbl.hidden = true;
      if (!ta.value.trim()) ta.hidden = true;
    }
  }

  function hydrate() {
    const s = load();
    document.getElementById("name").value = loadName();
    document.getElementById("house").value = s.house || "";
    document.getElementById("date").value = s.date || "";
    document.querySelectorAll("[data-check]").forEach(cb => {
      const st = s.items[cb.dataset.check];
      cb.checked = !!(st && st.done);
    });
    document.querySelectorAll("[data-note]").forEach(ta => {
      const st = s.items[ta.dataset.note];
      ta.value = (st && st.note) || "";
      if (ta.value) {
        ta.hidden = false;
        document.querySelector(`[data-note-btn="${ta.dataset.note}"]`).classList.add("has-note");
      }
    });
    document.querySelectorAll(".item[data-bad]").forEach(el => {
      const st = s.items[el.dataset.id];
      paintYN(el.dataset.id, st && st.answer);
    });
    document.querySelectorAll("[data-cnt]").forEach(inp => {
      inp.value = s.counts[inp.dataset.cnt] ?? "";
    });
    refresh();
  }

  function refresh() {
    const s = load();
    let done = 0, total = 0, flags = 0;
    document.querySelectorAll("details.section[data-g]").forEach(det => {
      let d = 0, t = 0, f = 0;
      det.querySelectorAll(".item").forEach(el => {
        t++;
        const cb = el.querySelector("[data-check]");
        if (cb) {
          if (cb.checked) d++;
          el.classList.toggle("done", cb.checked);
        } else {
          const st = s.items[el.dataset.id];
          if (st && st.answer) {
            d++;
            if (st.answer === el.dataset.bad) f++;
          }
        }
      });
      done += d; total += t; flags += f;
      const c = det.querySelector("[data-count]");
      c.innerHTML = `${f ? `<span class="flag">⚑ ${f}</span> ` : ""}${d}/${t}`;
      c.classList.toggle("complete", d === t);
    });
    document.getElementById("fill").style.width = total ? (done / total * 100) + "%" : "0%";
    document.getElementById("progressText").textContent =
      `${done} of ${total} items answered${flags ? ` — ${flags} issue${flags === 1 ? "" : "s"} flagged` : ""}`;
  }

  function persist() {
    const s = load();
    s.house = document.getElementById("house").value;
    s.date = document.getElementById("date").value;
    const items = {};
    document.querySelectorAll(".item").forEach(el => {
      const id = el.dataset.id;
      const note = el.querySelector(`[data-note="${id}"]`).value.trim();
      const cb = el.querySelector("[data-check]");
      if (cb) {
        if (cb.checked || note) items[id] = { done: cb.checked, note };
      } else {
        const prev = s.items[id];
        const answer = (prev && prev.answer) || null;
        if (answer || note) items[id] = { answer, note };
      }
    });
    s.items = items;
    s.counts = {};
    document.querySelectorAll("[data-cnt]").forEach(inp => {
      if (inp.value !== "") s.counts[inp.dataset.cnt] = inp.value;
    });
    // Survey answers (s.survey) are managed by the survey modal, not scanned
    // here; load() above preserves them.
    save(s);
    saveName(document.getElementById("name").value);
  }

  function setAnswer(id, val) {
    const s = load();
    const prev = s.items[id] || {};
    const answer = prev.answer === val ? null : val;   // tap again to clear
    s.items[id] = { ...prev, answer };
    save(s);
    paintYN(id, answer);
    refresh();
  }

  function buildSurvey() {
    const s = load();
    const answer = id => (s.survey && id in s.survey) ? s.survey[id] : "";
    const lines = [];
    lines.push("Maintenance House Visit Survey");
    lines.push("");
    lines.push(`Your Name: ${loadName() || "(not set)"}`);
    lines.push(`Date: ${s.date || "(not set)"}`);
    lines.push(`House Name: ${s.house || "(not set)"}`);
    lines.push("");
    SURVEY.forEach(sv => {
      lines.push(sv.q);
      lines.push(`  ${answer(sv.id) || "(blank)"}`);
      lines.push("");
    });
    return lines.join("\n").trimEnd();
  }

  document.addEventListener("change", () => { persist(); refresh(); });
  document.addEventListener("input", e => {
    if (e.target.matches("[data-note], #house, #name, [data-cnt]")) persist();
  });
  document.addEventListener("click", e => {
    const yn = e.target.closest("[data-yn]");
    if (yn) { setAnswer(yn.dataset.yn, yn.dataset.val); persist(); return; }
    const btn = e.target.closest("[data-note-btn]");
    if (btn) {
      const ta = document.querySelector(`[data-note="${btn.dataset.noteBtn}"]`);
      ta.hidden = !ta.hidden;
      if (!ta.hidden) ta.focus();
      btn.classList.toggle("has-note", !!ta.value.trim() || !ta.hidden);
    }
  });

  // ---- Visit survey modal ----
  const escAttr = v => String(v == null ? "" : v).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
  const escHtml = v => String(v == null ? "" : v).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const surveyModal = document.getElementById("surveyModal");

  function surveyModalHTML() {
    const s = load();
    const sug = surveySuggestions();
    // Saved answer wins; otherwise the checklist-derived suggestion; else blank.
    const val = id => (s.survey && id in s.survey) ? s.survey[id] : (sug[id] || "");
    const rows = [
      `<div class="modal-field" data-req="1"><label for="m-name">Your Name</label>
        <input id="m-name" type="text" value="${escAttr(loadName())}"></div>`,
      `<div class="modal-field" data-req="1"><label for="m-date">Date</label>
        <input id="m-date" type="date" value="${escAttr(s.date || "")}"></div>`,
      `<div class="modal-field" data-req="1"><label for="m-house">House Name</label>
        <input id="m-house" type="text" value="${escAttr(s.house || "")}"></div>`,
    ];
    SURVEY.forEach(sv => {
      rows.push(`<div class="modal-field"><label for="m-sv-${sv.id}">${escHtml(sv.q)}</label>
        <textarea id="m-sv-${sv.id}" rows="2">${escHtml(val(sv.id))}</textarea></div>`);
    });
    return rows.join("");
  }

  // Read every modal field back into state (survey answers, name, date, house).
  function syncModalToState() {
    const s = load();
    const nameEl = document.getElementById("m-name");
    const dateEl = document.getElementById("m-date");
    const houseEl = document.getElementById("m-house");
    if (nameEl) { document.getElementById("name").value = nameEl.value; saveName(nameEl.value); }
    if (dateEl) { s.date = dateEl.value; document.getElementById("date").value = dateEl.value; }
    if (houseEl) { s.house = houseEl.value; document.getElementById("house").value = houseEl.value; }
    s.survey = {};
    SURVEY.forEach(sv => {
      const el = document.getElementById("m-sv-" + sv.id);
      if (el && el.value.trim()) s.survey[sv.id] = el.value;
    });
    save(s);
  }

  // Require the identity fields (name / date / house); the questions may be
  // left blank (e.g. N/A). Returns true when valid.
  function validateSurveyModal(mark) {
    let ok = true;
    document.querySelectorAll("#surveyBody .modal-field[data-req]").forEach(f => {
      const ctrl = f.querySelector("input, textarea");
      if (!ctrl.value.trim()) { ok = false; if (mark) f.classList.add("missing"); }
      else f.classList.remove("missing");
    });
    document.getElementById("surveySend").disabled = !ok;
    return ok;
  }

  function openSurveyModal() {
    document.getElementById("surveyBody").innerHTML = surveyModalHTML();
    const msg = document.getElementById("surveyMsg");
    msg.textContent = ""; msg.className = "modal-msg";
    validateSurveyModal(false);
    surveyModal.showModal();
  }

  document.getElementById("openSurvey").addEventListener("click", openSurveyModal);
  document.getElementById("surveyClose").addEventListener("click", () => surveyModal.close());
  surveyModal.addEventListener("click", e => { if (e.target === surveyModal) surveyModal.close(); });
  document.getElementById("surveyBody").addEventListener("input", () => {
    syncModalToState();
    validateSurveyModal(false);
  });
  document.getElementById("surveySend").addEventListener("click", () => {
    const msg = document.getElementById("surveyMsg");
    syncModalToState();
    if (!validateSurveyModal(true)) {
      msg.textContent = "Please fill in the highlighted fields.";
      msg.className = "modal-msg error";
      return;
    }
    // The survey text is ready to send. SharePoint delivery isn't wired up yet.
    // TODO: POST buildSurvey() to the SharePoint list / Power Automate flow.
    msg.textContent = "✓ Saved. (Sending to SharePoint isn't connected yet.)";
    msg.className = "modal-msg ok";
  });

  // ---- House picker sidebar ----
  const sidebar = document.getElementById("sidebar");
  const sideBackdrop = document.getElementById("sideBackdrop");

  // Rebuild the checklist (used when the selected house changes, since house
  // tailoring affects which items render). State is preserved via localStorage.
  function rebuild() { build(); hydrate(); }

  function renderHouseList() {
    const filter = document.getElementById("houseSearch").value.trim().toLowerCase();
    const cur = currentHouse();
    const rows = [`<button type="button" class="house-btn none${cur ? "" : " sel"}" data-house="">(no house — full checklist)</button>`];
    ALL_HOUSES
      .filter(h => !filter || h.name.toLowerCase().includes(filter))
      .forEach(h => {
        const sel = cur && cur.name === h.name ? " sel" : "";
        rows.push(`<button type="button" class="house-btn${sel}" data-house="${escAttr(h.name)}">${escHtml(h.name)}</button>`);
      });
    document.getElementById("houseList").innerHTML = rows.join("");
  }

  function renderHouseInfo() {
    const box = document.getElementById("houseInfo");
    const h = currentHouse();
    if (!h) { box.innerHTML = ""; return; }
    const rows = [`<h3>${escHtml(h.name)} — house info</h3>`];
    (ALL_CODES[h.name] || []).forEach(([label, val]) =>
      rows.push(`<div class="info-item code"><b>${escHtml(label)}</b>${escHtml(val)}</div>`));
    (h.info || []).forEach(([label, val]) =>
      rows.push(`<div class="info-item"><b>${escHtml(label)}</b>${escHtml(val)}</div>`));
    box.innerHTML = rows.join("");
  }

  function openSidebar() {
    renderHouseList();
    renderHouseInfo();
    sidebar.hidden = false;
    sideBackdrop.hidden = false;
    document.getElementById("houseSearch").focus();
  }
  function closeSidebar() { sidebar.hidden = true; sideBackdrop.hidden = true; }

  document.getElementById("menuBtn").addEventListener("click", openSidebar);
  document.getElementById("sidebarClose").addEventListener("click", closeSidebar);
  sideBackdrop.addEventListener("click", closeSidebar);
  document.getElementById("houseSearch").addEventListener("input", renderHouseList);
  document.getElementById("houseList").addEventListener("click", e => {
    const btn = e.target.closest("[data-house]");
    if (!btn) return;
    document.getElementById("house").value = btn.dataset.house;
    persist();
    rebuild();
    renderHouseList();
    renderHouseInfo();
    closeSidebar();
  });
  // Typing a house name by hand re-tailors once the field loses focus.
  document.getElementById("house").addEventListener("change", () => { persist(); rebuild(); });

  document.getElementById("newVisit").addEventListener("click", () => {
    if (!confirm("Start a new visit? This clears all checks, answers, notes, and counts.")) return;
    save(blank());
    rebuild();
  });

  build();
  hydrate();
</script>

</html>
