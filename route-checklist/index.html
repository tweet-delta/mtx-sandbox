        { key: "van-drive-vehicle", text: "Drive house vehicle — notify RS of maintenance issues" },
        { key: "van-qstraint-tracks", text: "Clean Q-Straint tracks" },
        { key: "van-fire-extinguisher", text: "Check fire extinguisher", dateTracked: true },
        { key: "van-qstraint-rust", text: "Check Q-Straints for rust or damage" },
        { key: "van-straps", text: "Check lap belts, shoulder straps, chest straps" },
      ]},
      { title: "Generator", items: [
        { key: "gen-oil-filter", text: "Check oil & filter" },
        { key: "gen-run-10min", text: "Start & run generator for 10 minutes" },
        { key: "gen-test-receptacles", text: "Test 15 & 20 amp receptacles with lamp / voltmeter" },
        { key: "gen-pour-gas", text: "Pour generator gas into MTX or house van" },
        { key: "gen-refill-gas", text: "Refill generator gas cans with new gas" },
      ]},
      { title: "Maintenance Cabinet Stock", items: [
        { key: "stock-wireless-doorbell", text: "Wireless doorbell" },
        { key: "stock-extension-cord", text: "50' extension cord" },
        { key: "stock-door-alarm", text: "Door alarm (sensors)" },
        { key: "stock-traps", text: "Mouse / ant traps" },
        { key: "stock-hinges", text: "Hinges (house specific)" },
        { key: "stock-duct-tape", text: "Duct tape" },
        { key: "stock-toilet-seats", text: "Toilet seats" },
        { key: "stock-nail-screw-kit", text: "Nail / screw kit" },
        { key: "stock-toilet-handle", text: "Universal toilet handle" },
        { key: "stock-shower-head", text: "Shower head & holder" },
        { key: "stock-toilet-flapper", text: "Toilet flapper (house size specific)" },
        { key: "stock-star-nuts", text: "Star nuts (lawnmower / snowblower)" },
        { key: "stock-toilet-valve", text: "Toilet valve" },
        { key: "stock-tool-kit", text: "Tool kit" },
        { key: "stock-closet-hardware", text: "Closet hardware (house specific)" },
        { key: "stock-cover-plates", text: "Cover plates" },
        { key: "stock-door-knobs", text: "Door knobs" },
        { key: "stock-specialty-bulbs", text: "Specialty bulbs" },
      ]},
    ]},
    { label: "Visit Wrap-Up", cls: "wrap", sections: [
      { title: "Before You Leave", items: [
        { key: "wrap-check-requests", text: "Check website for requests — update ones assigned to you" },
        { key: "wrap-complete-others", text: "Try to complete requests not assigned to you — request updates from others" },
        { key: "wrap-email-steve", text: "Email urgent issues to Steve" },
      ]},
    ]},
  ];

  // Alarm counts, grouped by level so each level renders as its own row.
  const COUNTS = [
    { id: "res-water", label: "Water", group: "Resident" },
    { id: "res-co2",   label: "CO2",   group: "Resident" },
    { id: "res-smoke", label: "Smoke", group: "Resident" },
    { id: "rs-water",  label: "Water", group: "RS" },
    { id: "rs-co2",    label: "CO2",   group: "RS" },
    { id: "rs-smoke",  label: "Smoke", group: "RS" },
  ];
  // Build the counts markup once (it doesn't depend on state; values are
  // filled in by hydrate()). One row per group, three fields across.
  function countsBodyHTML() {
    const groups = [];
    COUNTS.forEach(c => {
      let g = groups.find(x => x.name === c.group);
      if (!g) { g = { name: c.group, items: [] }; groups.push(g); }
      g.items.push(c);
    });
    return `<div class="counts-body">${groups.map(g => `
      <div class="count-group">
        <div class="count-group-label">${g.name}</div>
        <div class="counts-row">${g.items.map(c =>
          `<div class="count-field"><label for="cnt-${c.id}">${c.label}</label>
           <input id="cnt-${c.id}" type="number" min="0" inputmode="numeric" data-cnt="${c.id}"></div>`).join("")}
        </div>
      </div>`).join("")}</div>`;
  }

  // End-of-visit survey (submitted after every house visit). Fields start
  // BLANK. Where a checklist item relates to a question, surveySuggestions()
  // supplies an editable suggested answer derived from the checklist; the rest
  // stay blank for staff to fill in. Name / Date / House come from the header.
  const SURVEY = [
    { id: "cars",   q: "Were there cars parked on the street? If so, how many?" },
    { id: "snow",   q: "Was the driveway and sidewalks free of snow/ice? If no, please provide details (N/A if not correct season)" },
    { id: "lawn",   q: "Was the lawn mowed? If no, please provide details (N/A if not correct season)" },
    { id: "yard",   q: "Was the yard free from weeds and other debris (toys, dog droppings, etc)? If no, please provide details" },
    { id: "livein", q: "Live-In Space Condition (Please provide details if there are concerns)" },
    { id: "reach",  q: "Was it easy to get ahold of the live-in to let you into the live-in space? (If no, please provide details i.e. you had to call multiple times, etc)" },
    { id: "other",  q: "Any other concerns or positives?" },
  ];

  // Find a checklist item's saved state by section title + a substring of its
  // question text. Returns {} if not found or unanswered.
  function findItemState(sectionTitle, qIncludes) {
    const s = load();
    let res = {};
    GROUPS.forEach(group => group.sections.forEach(section => {
      if (section.title !== sectionTitle) return;
      section.items.forEach(item => {
        if (isYN(item) && item.q.indexOf(qIncludes) !== -1) res = s.items[item.key] || {};
      });
    }));
    return res;
  }

  // Suggested survey answers derived from the checklist. Only questions with a
  // related, answered checklist item get a suggestion; the rest stay blank.
  function surveySuggestions() {
    const s = load();
    const sug = {};
    const flags = [], rsFlags = [];
    GROUPS.forEach(group => group.sections.forEach(section => {
      section.items.forEach(item => {
        if (!isYN(item)) return;
        const st = s.items[item.key];
        if (st && st.answer === item.bad) {
          const entry = item.q + (st.note ? " — " + st.note : "");
          flags.push(entry);
          if (group.label === "RS Unit") rsFlags.push(entry);
        }
      });
    }));
    // Snow/ice ← Outside "Sidewalks / driveway free of trip & fall hazards?"
    const hazard = findItemState("Outside", "Sidewalks / driveway free of trip");
    if (hazard.answer === "yes") sug.snow = "Yes";
    else if (hazard.answer === "no") sug.snow = "No" + (hazard.note ? " — " + hazard.note : "");
    // Live-in space condition ← flagged RS Unit items
    if (rsFlags.length) sug.livein = "Concerns: " + rsFlags.join("; ");
    // Other concerns ← every flagged issue on the checklist
    if (flags.length) sug.other = "From checklist:\n" + flags.map(f => "• " + f).join("\n");
    return sug;
  }

  // ---- House-specific tailoring (data in house-data.js / house-codes.local.js) ----
  let ALL_HOUSES = typeof HOUSES !== "undefined" ? HOUSES : [];
  const ALL_CODES = typeof HOUSE_CODES !== "undefined" ? HOUSE_CODES : {};
  // The cloud layer (cloud.js) calls this after login to swap the local
  // fallback roster for the houses loaded from Supabase.
  window.applyHouses = function (houses) {
    if (Array.isArray(houses)) { ALL_HOUSES = houses; rebuild(); }
  };

  // Connects checklist items (by text match) to house data:
  //   note — key into house.notes, shown inline under the item.
  //   flag — key into house.equipment; false hides the item for that house.
  const NOTE_RULES = [
    { match: /fire extinguisher up to date/i, note: "fireExtinguishers" },
    { match: /furnace filter/i,         note: "furnaceFilter" },
    { match: /refrigerator coils/i,     note: "fridgeCoils" },
    { match: /water softener/i,         note: "waterSoftener", flag: "waterSoftener" },
    { match: /gas & water shutoffs/i,   note: "shutoffs" },
    { match: /sharpen knives/i,         note: "knives" },
    { match: /med lock/i,               note: "medLock" },
    { match: /attic ventilation/i,      note: "atticAccess" },
    { match: /dryer vents/i,            note: "dryerVents" },
    { match: /roof coils/i,             flag: "roofCoils" },
    { match: /sump pump/i,              flag: "sumpPump" },
    { match: /garbage disposal/i,       flag: "garbageDisposal" },
    { match: /HE washers/i,             flag: "frontLoadWashers" },
    { match: /air exchanger/i,          flag: "airExchanger" },
  ];
  // Whole sections hidden when the house lacks the equipment.
  const SECTION_FLAGS = { "Generator": "generator" };

  function currentHouse() {
    const name = (load().house || "").trim().toLowerCase();
    if (!name) return null;
    return ALL_HOUSES.find(h => h.name.toLowerCase() === name) || null;
  }

  // ---- Date-tracked jobs (items with dateTracked and/or everyMonths) ----
  // dateTracked: the tech records the actual date the job was done (Update
  // button → date picker). everyMonths: also compute a due date from that.
  const ITEM_BY_KEY = {};
  GROUPS.forEach(g => g.sections.forEach(sec => sec.items.forEach(it => { ITEM_BY_KEY[it.key] = it; })));
  const DATED_KEYS = Object.keys(ITEM_BY_KEY).filter(k => ITEM_BY_KEY[k].dateTracked || ITEM_BY_KEY[k].everyMonths);

  // Last-done dates for these items at the CURRENT house, from cloud history.
  let LAST_DONE = {};
  async function refreshDueInfo() {
    LAST_DONE = {};
    const h = currentHouse();
    if (h && window.cloud && DATED_KEYS.length) {
      LAST_DONE = await window.cloud.lastDone(h.name, DATED_KEYS);
    }
    paintDue();
  }

  function addMonths(iso, m) { const d = new Date(iso + "T00:00:00"); d.setMonth(d.getMonth() + m); return d; }
  function fmtDate(iso) { return new Date(iso + "T00:00:00").toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }); }
  function fmtMY(d) { return d.toLocaleDateString(undefined, { month: "short", year: "numeric" }); }

  // Fill each date-tracked item's badge. A date entered THIS visit (local
  // state) wins over history. everyMonths items dim when not yet due (and drop
  // out of the progress totals until done — doing them early is always fine).
  function paintDue() {
    const s = load();
    document.querySelectorAll("[data-due]").forEach(sp => {
      const key = sp.dataset.due;
      const el = sp.closest(".item");
      const every = ITEM_BY_KEY[key].everyMonths;
      const thisVisit = s.items[key] && s.items[key].doneOn;   // date set on this visit
      const last = thisVisit || LAST_DONE[key];
      let notdue = false;
      if (!last) {
        sp.className = "due";
        sp.textContent = every
          ? `↻ Every ${every === 12 ? "year" : every + " months"} — no record yet`
          : "↻ No date on record yet";
      } else if (every) {
        const dueD = addMonths(last, every);
        if (!thisVisit && new Date() < dueD) {
          notdue = true;
          sp.className = "due ok";
          sp.textContent = `✓ Done ${fmtMY(new Date(last + "T00:00:00"))} · not due till ${fmtMY(dueD)}`;
        } else if (thisVisit) {
          sp.className = "due ok";
          sp.textContent = `✓ Recorded ${fmtDate(thisVisit)}`;
        } else {
          sp.className = "due over";
          sp.textContent = `⚠ Due now — last done ${fmtMY(new Date(last + "T00:00:00"))}`;
        }
      } else {
        sp.className = "due ok";
        sp.textContent = thisVisit
          ? `✓ Recorded ${fmtDate(thisVisit)}`
          : `Last done ${fmtDate(last)}`;
      }
      sp.hidden = false;
      el.classList.toggle("notdue", notdue);
    });
    refresh();
  }

  // Bumped to v3 when items moved from positional ids to stable keys (a breaking
  // change: answers previously keyed by position won't map onto the new keys).
  const STORE_KEY = "route-checklist-v3";
  // Route person's name persists across visits (same person each time).
  const NAME_KEY = "route-checklist-name";
  function loadName() { try { return localStorage.getItem(NAME_KEY) || ""; } catch { return ""; } }
  function saveName(n) { try { localStorage.setItem(NAME_KEY, n); } catch {} }
  let memory = null;
  function load() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || blank(); }
    catch { return memory || blank(); }
  }
  function save(s) {
    memory = s;
    try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch {}
  }
  function blank() {
    return { house: "", date: new Date().toISOString().slice(0, 10), items: {}, counts: {}, survey: {} };
  }

  function isYN(item) { return "q" in item; }
  function itemLabel(item) { return isYN(item) ? item.q : item.text; }

  // The tech can dismiss the up-front house picker to run the full generic list.
  let pickerDismissed = false;

  // Houses on MY route: a Set of lowercase names, pushed by cloud.js via
  // applyMyHouses. null = no route info (logged out / migration 0007 not run /
  // supervisor) → pickers show every house, exactly as before routes existed.
  let MY_HOUSE_NAMES = null;
  // The tech tapped "Show all houses…" (float day / covering another route).
  // Reset each time the picker is opened fresh from Home.
  let pickerShowAll = false;

  // ---- "Preview as tech" (supervisor-only, purely client-side) ----
  // Flips the UI to what a route's tech sees: admin controls hidden, pickers
  // scoped to that route. No DB writes and no impersonation — the supervisor
  // stays signed in as themselves and RLS still governs real access.
  let previewingRoute = null;   // route NAME while previewing, else null
  const previewBanner = document.getElementById("previewBanner");
  const previewLabel  = document.getElementById("previewLabel");
  function clearPreviewUI() {
    previewingRoute = null;
    previewBanner.hidden = true;
    document.body.classList.remove("previewing");
  }
  function startPreview(routeName, houseNames) {
    previewingRoute = routeName;
    previewLabel.textContent = "Previewing " + routeName;
    previewBanner.hidden = false;
    document.body.classList.add("previewing");
    document.body.classList.remove("is-admin");   // hide supervisor controls
    MY_HOUSE_NAMES = houseNames;                  // scope pickers like the tech's
    pickerShowAll = false;
    location.hash = "#home";                      // land where the tech lands
    rebuild();
  }
  function exitPreview() {
    clearPreviewUI();
    document.body.classList.toggle("is-admin",
      !!window.cloud && window.cloud.role === "supervisor");
    // Re-derive the real scoping from the cloud layer (supervisor → unscoped).
    if (window.cloud && window.cloud.refreshMyRoute) window.cloud.refreshMyRoute();
    else window.applyMyHouses(null);
  }
  document.getElementById("previewExit").addEventListener("click", exitPreview);

  window.applyMyHouses = function (names) {
    // A real push from the cloud layer (sign-in/out, route reload) always
    // wins over a preview — otherwise a stale banner could survive a sign-out.
    if (previewingRoute !== null) clearPreviewUI();
    MY_HOUSE_NAMES = names instanceof Set ? names : null;
    rebuild();
  };

  function pickListHTML(filter) {
    const f = (filter || "").trim().toLowerCase();
    const scoped = !pickerShowAll && MY_HOUSE_NAMES instanceof Set
      ? ALL_HOUSES.filter(h => MY_HOUSE_NAMES.has(h.name.trim().toLowerCase()))
      : null;
    const pool = scoped || ALL_HOUSES;
    const matches = pool.filter(h => !f || h.name.toLowerCase().includes(f));
    let html;
    if (!matches.length) {
      html = scoped && !scoped.length
        ? `<p class="pick-none">No houses are assigned to your route yet — ask a supervisor, or use "Show all houses".</p>`
        : `<p class="pick-none">No house matches "${filter.replace(/</g, "&lt;")}".</p>`;
    } else {
      html = matches.map(h =>
        `<button type="button" class="pick-btn" data-pick-house="${h.name.replace(/"/g, "&quot;")}">${h.name.replace(/</g, "&lt;")}</button>`).join("");
    }
    if (scoped) html += `<button type="button" class="pick-all" data-pick-all>Show all houses…</button>`;
    return html;
  }

  function build() {
    const app = document.getElementById("app");
    const house = currentHouse();
    let html = "";
    // No house picked yet → type-to-find picker (scales to 40+ houses).
    if ((!house && !pickerDismissed) || forceShowPicker) {
      html += `<div class="pick-house">
        <h2>Which house are you at?</h2>
        <input type="search" id="pickSearch" placeholder="Type the house name…" aria-label="Search houses">
        <div class="pick-list" id="pickList">${pickListHTML("")}</div>
        <button type="button" class="pick-skip" data-pick-house="">Skip — use the full checklist</button>
      </div>`;
    }
    GROUPS.forEach((group, g) => {
      html += `<div class="group-label ${group.cls}">${group.label}</div>`;
      group.sections.forEach((section, s) => {
        // Hide whole sections for equipment the selected house doesn't have.
        const secFlag = SECTION_FLAGS[section.title];
        if (house && secFlag && house.equipment && house.equipment[secFlag] === false) return;
        html += `<details class="section" data-g="${g}" data-s="${s}">
          <summary><svg class="chev" width="12" height="12" viewBox="0 0 12 12" aria-hidden="true"><path d="M4 2l4 4-4 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>${section.title}<span class="count" data-count></span></summary>
          <div class="items">`;
        // Generator isn't at every house: one tap marks the whole section N/A
        // (shown when the house's equipment is unknown or no house is picked).
        if (section.title === "Generator") {
          html += `<div class="na-row"><button type="button" class="na-btn" data-na-sec aria-pressed="false">No generator at this house — mark section N/A</button></div>`;
        }
        // Cabinet stock is usually all present: one tap checks the whole list.
        if (section.title === "Maintenance Cabinet Stock") {
          html += `<div class="na-row"><button type="button" class="na-btn" data-check-all aria-pressed="false">Check all — full stock</button></div>`;
        }
        section.items.forEach((item) => {
          const id = item.key;
          const label = itemLabel(item);
          const safeLabel = label.replace(/"/g, "&quot;");
          // House tailoring: skip items for missing equipment; collect notes.
          let houseNote = "";
          if (house) {
            const rules = NOTE_RULES.filter(r => r.match.test(label));
            if (rules.some(r => r.flag && house.equipment && house.equipment[r.flag] === false)) return;
            const texts = rules.map(r => r.note && house.notes && house.notes[r.note]).filter(Boolean);
            if (texts.length) houseNote = `<div class="house-note">📍 ${texts.join(" · ").replace(/</g, "&lt;")}</div>`;
          }
          // Date-tracked jobs get a badge slot; paintDue() fills it from history
          // and any date entered this visit.
          const dueSlot = (item.dateTracked || item.everyMonths) ? `<span class="due" data-due="${id}" hidden></span>` : "";
          const noteBtn = `<button class="note-btn" data-note-btn="${id}" aria-label="Add note for: ${safeLabel}"><span aria-hidden="true">✎</span><span class="note-word"> Note</span></button>`;
          if (item.dateTracked) {
            // Recording the actual date IS the completion. Items flagged
            // withCheckbox also get a tick that stamps today's date (editable
            // via the date field) — "checked" simply means "has a done date".
            const label2 = item.withCheckbox
              ? `<label class="tick"><input type="checkbox" data-datecheck="${id}"><span class="qtext">${label}</span></label>`
              : `<span class="qtext">${label}</span>`;
            html += `<div class="item dated" data-id="${id}">
              <div class="item-row">
                ${label2}
                <button class="update-btn" data-update="${id}">Update date</button>
                ${noteBtn}
              </div>
              ${houseNote}${dueSlot}
              <input type="date" class="date-field" data-date="${id}" aria-label="Date done for: ${safeLabel}" hidden>
              <textarea data-note="${id}" placeholder="Comment / issue found…" hidden></textarea>
            </div>`;
          } else if (item.tempInput) {
            // Checkbox that, when checked, reveals a number field for the reading.
            html += `<div class="item" data-id="${id}" data-tempinput="1">
              <div class="item-row">
                <label class="tick"><input type="checkbox" data-check="${id}"><span class="qtext">${label}</span></label>
                ${noteBtn}
              </div>
              ${houseNote}
              <div class="temp-wrap" data-temp-wrap="${id}" hidden>
                <label for="temp-${id}">Highest reading °F</label>
                <input id="temp-${id}" type="number" inputmode="decimal" data-temp="${id}" placeholder="e.g. 108">
              </div>
              <textarea data-note="${id}" placeholder="Comment / issue found…" hidden></textarea>
            </div>`;
          } else if (isYN(item)) {
            html += `<div class="item" data-id="${id}" data-bad="${item.bad}">
              <div class="item-row">
                <span class="qtext">${item.q}</span>
                <span class="yn" role="group" aria-label="${safeLabel}">
                  <button class="yn-btn" data-yn="${id}" data-val="yes">Yes</button>
                  <button class="yn-btn" data-yn="${id}" data-val="no">No</button>
                </span>
                ${noteBtn}
              </div>
              ${houseNote}
              <div class="reason-label" data-reason-label="${id}" hidden>Reason / what needs follow-up</div>
              <textarea data-note="${id}" placeholder="Comment / issue found…" hidden></textarea>
            </div>`;
          } else {
            html += `<div class="item" data-id="${id}">
              <div class="item-row">
                <label class="tick"><input type="checkbox" data-check="${id}"><span class="qtext">${label}</span></label>
                ${noteBtn}
              </div>
              ${houseNote}
              <textarea data-note="${id}" placeholder="Comment / issue found…" hidden></textarea>
            </div>`;
          }
        });
        html += `</div></details>`;
        if (group.label === "Shared Spaces" && section.title === "Common Areas") {
          html += `<details class="section" id="alarmCounts">
            <summary><svg class="chev" width="12" height="12" viewBox="0 0 12 12" aria-hidden="true"><path d="M4 2l4 4-4 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Alarm Counts<span class="count" data-static></span></summary>
            ${countsBodyHTML()}</details>`;
        }
      });
    });
    app.innerHTML = html;
  }

  // Reflect one yes/no item's answer in its buttons + reason box.
  function paintYN(id, answer) {
    const itemEl = document.querySelector(`.item[data-id="${id}"]`);
    if (!itemEl) return;
    const bad = itemEl.dataset.bad;
    const isBad = answer && answer === bad;
    itemEl.querySelectorAll(`[data-yn="${id}"]`).forEach(b => {
      const sel = answer === b.dataset.val;
      b.classList.toggle("sel-good", sel && !isBad);
      b.classList.toggle("sel-bad", sel && isBad);
      b.setAttribute("aria-pressed", sel ? "true" : "false");
    });
    itemEl.classList.toggle("flagged", !!isBad);
    itemEl.classList.toggle("done", !!answer && !isBad);
    const ta = itemEl.querySelector(`[data-note="${id}"]`);
    const lbl = itemEl.querySelector(`[data-reason-label="${id}"]`);
    if (isBad) {
      ta.hidden = false;
      ta.classList.add("reason");
      ta.placeholder = "What's wrong? What needs to happen?";
      lbl.hidden = false;
    } else {
      ta.classList.remove("reason");
      ta.placeholder = "Comment / issue found…";
      lbl.hidden = true;
      if (!ta.value.trim()) ta.hidden = true;
    }
  }

  function hydrate() {
    const s = load();
    document.getElementById("name").value = loadName();
    document.getElementById("house").value = s.house || "";
    document.getElementById("date").value = s.date || "";
    document.querySelectorAll("[data-check]").forEach(cb => {
      const st = s.items[cb.dataset.check];
      cb.checked = !!(st && st.done);
    });
    document.querySelectorAll("[data-note]").forEach(ta => {
      const st = s.items[ta.dataset.note];
      ta.value = (st && st.note) || "";
      if (ta.value) {
        ta.hidden = false;
        document.querySelector(`[data-note-btn="${ta.dataset.note}"]`).classList.add("has-note");
      }
    });
    document.querySelectorAll(".item[data-bad]").forEach(el => {
      const st = s.items[el.dataset.id];
      paintYN(el.dataset.id, st && st.answer);
    });
    // Date-tracked items: put any recorded date back in the (hidden) picker,
    // and for items with a checkbox, tick it (and reveal the field) when a
    // date is recorded.
    document.querySelectorAll("[data-date]").forEach(inp => {
      const st = s.items[inp.dataset.date];
      inp.value = (st && st.doneOn) || "";
      syncDateCheckbox(inp.dataset.date);
      const cb = document.querySelector(`[data-datecheck="${inp.dataset.date}"]`);
      if (cb && inp.value) inp.hidden = false;
    });
    // Water-temp items: restore the reading and reveal it if the box is checked.
    document.querySelectorAll("[data-temp]").forEach(inp => {
      const st = s.items[inp.dataset.temp];
      inp.value = (st && st.temp) || "";
      const wrap = document.querySelector(`[data-temp-wrap="${inp.dataset.temp}"]`);
      const cb = document.querySelector(`[data-check="${inp.dataset.temp}"]`);
      if (wrap) wrap.hidden = !(cb && cb.checked);
    });
    document.querySelectorAll("[data-cnt]").forEach(inp => {
      inp.value = s.counts[inp.dataset.cnt] ?? "";
    });
    paintDue();
  }

  function refresh() {
    const s = load();
    let done = 0, total = 0, flags = 0;
    document.querySelectorAll("details.section[data-g]").forEach(det => {
      let d = 0, t = 0, f = 0, naCount = 0, itemCount = 0;
      det.querySelectorAll(".item").forEach(el => {
        itemCount++;
        const st = s.items[el.dataset.id];
        const na = !!(st && st.na);
        el.classList.toggle("na", na);
        const cb = el.querySelector("[data-check]");
        const dated = el.classList.contains("dated");
        // Is this item satisfied this visit? (checkbox ticked / date recorded /
        // yes-no answered)
        const answered = cb ? cb.checked
          : dated ? !!(st && st.doneOn)
          : el.dataset.bad ? !!(st && st.answer)
          : false;
        // A not-due date-tracked job doesn't count toward progress unless the
        // tech does it anyway (early is fine — it records a fresh date).
        if (el.classList.contains("notdue") && !na && !answered) {
          el.classList.remove("done");
          return;
        }
        t++;
        if (na) { naCount++; d++; el.classList.add("done"); return; }
        if (cb) {
          if (cb.checked) d++;
          el.classList.toggle("done", cb.checked);
        } else if (dated) {
          if (answered) d++;
          el.classList.toggle("done", answered);
        } else if (el.dataset.bad) {
          if (st && st.answer) {
            d++;
            if (st.answer === el.dataset.bad) f++;
          }
        }
      });
      done += d; total += t; flags += f;
      const c = det.querySelector("[data-count]");
      c.innerHTML = `${f ? `<span class="flag">⚑ ${f}</span> ` : ""}${d}/${t}`;
      c.classList.toggle("complete", d === t && t > 0);
      // Reflect the section N/A button (Generator) if this section has one.
      const naBtn = det.querySelector("[data-na-sec]");
      if (naBtn) {
        const allNA = naCount === itemCount && itemCount > 0;
        naBtn.setAttribute("aria-pressed", allNA ? "true" : "false");
        naBtn.classList.toggle("on", allNA);
        naBtn.textContent = allNA
          ? "✓ Section marked N/A — tap to undo"
          : "No generator at this house — mark section N/A";
      }
      // Reflect the "Check all" button (Cabinet Stock) if this section has one.
      const caBtn = det.querySelector("[data-check-all]");
      if (caBtn) {
        const boxes = det.querySelectorAll("[data-check]");
        const allChecked = boxes.length > 0 && [...boxes].every(cb => cb.checked);
        caBtn.setAttribute("aria-pressed", allChecked ? "true" : "false");
        caBtn.classList.toggle("on", allChecked);
        caBtn.textContent = allChecked ? "✓ All checked — tap to clear" : "Check all — full stock";
      }
    });
    document.getElementById("fill").style.width = total ? (done / total * 100) + "%" : "0%";
    document.getElementById("progressText").textContent =
      `${done} of ${total} items answered${flags ? ` — ${flags} issue${flags === 1 ? "" : "s"} flagged` : ""}`;
  }

  function persist() {
    const s = load();
    s.house = document.getElementById("house").value;
    s.date = document.getElementById("date").value;
    const items = {};
    document.querySelectorAll(".item").forEach(el => {
      const id = el.dataset.id;
      const note = el.querySelector(`[data-note="${id}"]`).value.trim();
      const cb = el.querySelector("[data-check]");
      const prev = s.items[id] || {};
      const na = !!prev.na;   // N/A and the recorded date live in state, not the DOM
      if (el.classList.contains("dated")) {
        const doneOn = prev.doneOn || null;
        if (doneOn || note || na) items[id] = { doneOn, note, ...(na && { na }) };
      } else if (cb) {
        const tempEl = el.querySelector(`[data-temp="${id}"]`);
        const temp = tempEl ? tempEl.value.trim() : "";
        if (cb.checked || note || na || temp)
          items[id] = { done: cb.checked, note, ...(temp && { temp }), ...(na && { na }) };
      } else {
        const answer = prev.answer || null;
        if (answer || note || na) items[id] = { answer, note, ...(na && { na }) };
      }
    });
    s.items = items;
    s.counts = {};
    document.querySelectorAll("[data-cnt]").forEach(inp => {
      if (inp.value !== "") s.counts[inp.dataset.cnt] = inp.value;
    });
    // Survey answers (s.survey) are managed by the survey modal, not scanned
    // here; load() above preserves them.
    save(s);
    saveName(document.getElementById("name").value);
  }

  function setAnswer(id, val) {
    const s = load();
    const prev = s.items[id] || {};
    const answer = prev.answer === val ? null : val;   // tap again to clear
    s.items[id] = { ...prev, answer };
    delete s.items[id].na;   // a real Yes/No answer overrides section N/A
    save(s);
    paintYN(id, answer);
    refresh();
  }

  // Date-tracked item: record the actual date the job was done (may differ
  // from the visit date). Clearing the field un-records it.
  function setDate(id, val) {
    const s = load();
    const prev = s.items[id] || {};
    if (val) { s.items[id] = { ...prev, doneOn: val }; delete s.items[id].na; }
    else {
      delete prev.doneOn;
      if (prev.note || prev.na) s.items[id] = prev; else delete s.items[id];
    }
    save(s);
    paintDue();   // repaint this badge + progress
  }

  // Cabinet stock "Check all": one tap ticks every checkbox in the section;
  // if they're already all ticked, it clears them.
  function toggleCheckAll(det) {
    const boxes = [...det.querySelectorAll("[data-check]")];
    const allChecked = boxes.length > 0 && boxes.every(cb => cb.checked);
    boxes.forEach(cb => { cb.checked = !allChecked; });
    persist();
    refresh();
  }

  // Generator section N/A: one tap marks every item in the section N/A;
  // tapping again clears it.
  function toggleSectionNA(det) {
    const s = load();
    const keys = [...det.querySelectorAll(".item")].map(el => el.dataset.id);
    const allNA = keys.every(k => s.items[k] && s.items[k].na);
    keys.forEach(k => {
      if (allNA) {
        delete s.items[k];
      } else {
        s.items[k] = { ...(s.items[k] || {}), na: true };
        delete s.items[k].answer;
        delete s.items[k].done;
      }
    });
    save(s);
    hydrate();   // repaint checkboxes / buttons / counts from state
  }

  function buildSurvey() {
    const s = load();
    const answer = id => (s.survey && id in s.survey) ? s.survey[id] : "";
    const lines = [];
    lines.push("Maintenance House Visit Survey");
    lines.push("");
    lines.push(`Your Name: ${loadName() || "(not set)"}`);
    lines.push(`Date: ${s.date || "(not set)"}`);
    lines.push(`House Name: ${s.house || "(not set)"}`);
    lines.push("");
    SURVEY.forEach(sv => {
      lines.push(sv.q);
      lines.push(`  ${answer(sv.id) || "(blank)"}`);
      lines.push("");
    });
    return lines.join("\n").trimEnd();
  }

  document.addEventListener("change", e => {
    // Recording a date routes through setDate (keeps the badge + progress live).
    if (e.target.matches("[data-date]")) {
      setDate(e.target.dataset.date, e.target.value);
      syncDateCheckbox(e.target.dataset.date);   // keep the tick in sync with the date
      refresh();
      return;
    }
    // Checkbox on a date-tracked item: checking stamps today's date (editable
    // via the field); unchecking clears it. "Done" = "has a date".
    if (e.target.matches("[data-datecheck]")) {
      const id = e.target.dataset.datecheck;
      const inp = document.querySelector(`[data-date="${id}"]`);
      if (e.target.checked) {
        if (!inp.value) inp.value = new Date().toISOString().slice(0, 10);
        inp.hidden = false;
        setDate(id, inp.value);
      } else {
        inp.value = "";
        inp.hidden = true;
        setDate(id, "");
      }
      refresh();
      return;
    }
    // Toggling a water-temp checkbox shows/hides its reading field.
    if (e.target.matches("[data-check]")) {
      const wrap = document.querySelector(`[data-temp-wrap="${e.target.dataset.check}"]`);
      if (wrap) wrap.hidden = !e.target.checked;
    }
    persist(); refresh();
  });

  // Reflect a date-tracked item's recorded date onto its checkbox (if it has
  // one): a date present means checked. Called on hydrate and after date edits.
  function syncDateCheckbox(id) {
    const cb = document.querySelector(`[data-datecheck="${id}"]`);
    if (!cb) return;
    const inp = document.querySelector(`[data-date="${id}"]`);
    cb.checked = !!(inp && inp.value);
  }
  document.addEventListener("input", e => {
    if (e.target.matches("[data-note], #house, #name, [data-cnt], [data-temp]")) persist();
    if (e.target.matches("#pickSearch")) {
      document.getElementById("pickList").innerHTML = pickListHTML(e.target.value);
    }
  });
  document.addEventListener("click", e => {
    if (e.target.closest("[data-pick-all]")) {
      pickerShowAll = true;
      const search = document.getElementById("pickSearch");
      document.getElementById("pickList").innerHTML = pickListHTML(search ? search.value : "");
      return;
    }
    const pick = e.target.closest("[data-pick-house]");
    if (pick) {
      if (!pick.dataset.pickHouse) pickerDismissed = true;
      selectHouse(pick.dataset.pickHouse);
      return;
    }
    const naBtn = e.target.closest("[data-na-sec]");
    if (naBtn) { toggleSectionNA(naBtn.closest("details.section")); return; }
    const caBtn = e.target.closest("[data-check-all]");
    if (caBtn) { toggleCheckAll(caBtn.closest("details.section")); return; }
    const upd = e.target.closest("[data-update]");
    if (upd) {
      // Reveal the date picker and open it. Default to today if empty, so the
      // common case (done today) is one tap, but the tech can change it.
      const inp = document.querySelector(`[data-date="${upd.dataset.update}"]`);
      inp.hidden = false;
      if (!inp.value) inp.value = new Date().toISOString().slice(0, 10);
      inp.focus();
      if (inp.showPicker) { try { inp.showPicker(); } catch {} }
      setDate(upd.dataset.update, inp.value);
      return;
    }
    const yn = e.target.closest("[data-yn]");
    if (yn) { setAnswer(yn.dataset.yn, yn.dataset.val); persist(); return; }
    const btn = e.target.closest("[data-note-btn]");
    if (btn) {
      const ta = document.querySelector(`[data-note="${btn.dataset.noteBtn}"]`);
      ta.hidden = !ta.hidden;
      if (!ta.hidden) ta.focus();
      btn.classList.toggle("has-note", !!ta.value.trim() || !ta.hidden);
    }
  });

  // ---- Visit survey modal ----
  const escAttr = v => String(v == null ? "" : v).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
  const escHtml = v => String(v == null ? "" : v).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const surveyModal = document.getElementById("surveyModal");

  function surveyModalHTML() {
    const s = load();
    const sug = surveySuggestions();
    // Saved answer wins; otherwise the checklist-derived suggestion; else blank.
    const val = id => (s.survey && id in s.survey) ? s.survey[id] : (sug[id] || "");
    const rows = [
      `<div class="modal-field" data-req="1"><label for="m-name">Your Name</label>
        <input id="m-name" type="text" value="${escAttr(loadName())}"></div>`,
      `<div class="modal-field" data-req="1"><label for="m-date">Date</label>
        <input id="m-date" type="date" value="${escAttr(s.date || "")}"></div>`,
      `<div class="modal-field" data-req="1"><label for="m-house">House Name</label>
        <input id="m-house" type="text" value="${escAttr(s.house || "")}"></div>`,
    ];
    SURVEY.forEach(sv => {
      rows.push(`<div class="modal-field"><label for="m-sv-${sv.id}">${escHtml(sv.q)}</label>
        <textarea id="m-sv-${sv.id}" rows="2">${escHtml(val(sv.id))}</textarea></div>`);
    });
    return rows.join("");
  }

  // Read every modal field back into state (survey answers, name, date, house).
  function syncModalToState() {
    const s = load();
    const nameEl = document.getElementById("m-name");
    const dateEl = document.getElementById("m-date");
    const houseEl = document.getElementById("m-house");
    if (nameEl) { document.getElementById("name").value = nameEl.value; saveName(nameEl.value); }
    if (dateEl) { s.date = dateEl.value; document.getElementById("date").value = dateEl.value; }
    if (houseEl) { s.house = houseEl.value; document.getElementById("house").value = houseEl.value; }
    s.survey = {};
    SURVEY.forEach(sv => {
      const el = document.getElementById("m-sv-" + sv.id);
      if (el && el.value.trim()) s.survey[sv.id] = el.value;
    });
    save(s);
  }

  // Require the identity fields (name / date / house); the questions may be
  // left blank (e.g. N/A). Returns true when valid.
  function validateSurveyModal(mark) {
    let ok = true;
    document.querySelectorAll("#surveyBody .modal-field[data-req]").forEach(f => {
      const ctrl = f.querySelector("input, textarea");
      if (!ctrl.value.trim()) { ok = false; if (mark) f.classList.add("missing"); }
      else f.classList.remove("missing");
    });
    document.getElementById("surveySend").disabled = !ok;
    return ok;
  }

  function openSurveyModal() {
    document.getElementById("surveyBody").innerHTML = surveyModalHTML();
    const msg = document.getElementById("surveyMsg");
    msg.textContent = ""; msg.className = "modal-msg";
    validateSurveyModal(false);
    surveyModal.showModal();
  }

  document.getElementById("openSurvey").addEventListener("click", openSurveyModal);
  document.getElementById("surveyClose").addEventListener("click", () => surveyModal.close());
  surveyModal.addEventListener("click", e => { if (e.target === surveyModal) surveyModal.close(); });
  document.getElementById("surveyBody").addEventListener("input", () => {
    syncModalToState();
    validateSurveyModal(false);
  });
  // Turn the saved local state into the shape cloud.saveVisit() expects:
  // one row per item that carries information (done / answered / N/A / note).
  function visitPayload() {
    const s = load();
    const items = Object.entries(s.items).map(([key, st]) => ({
      key,
      // A recorded date counts as done for that item.
      done: st.na ? null : (typeof st.done === "boolean" ? st.done : (st.doneOn ? true : null)),
      answer: st.na ? "na" : (st.answer || null),
      note: (st.note || "").trim() || null,
      doneOn: st.doneOn || null,      // date-tracked jobs → visit_items.done_on
      value: (st.temp || "").trim() || null,   // water-temp reading → visit_items.value
    })).filter(it => it.done || it.answer || it.note || it.doneOn || it.value);
    return {
      houseName: (s.house || "").trim(),
      date: s.date,
      counts: s.counts,
      survey: s.survey,
      items,
      existingId: s.cloudVisitId || null,
    };
  }

  document.getElementById("surveySend").addEventListener("click", async () => {
    const msg = document.getElementById("surveyMsg");
    const sendBtn = document.getElementById("surveySend");
    syncModalToState();
    if (!validateSurveyModal(true)) {
      msg.textContent = "Please fill in the highlighted fields.";
      msg.className = "modal-msg error";
      return;
    }
    // Save the completed visit to the cloud. This is also what stamps the
    // "last done" dates that future visits' due badges read.
    // TODO (Phase 3+): also POST buildSurvey() to SharePoint / Power Automate.
    if (!window.cloud) {
      msg.textContent = "Cloud isn't loaded — visit kept on this device only.";
      msg.className = "modal-msg error";
      return;
    }
    sendBtn.disabled = true;
    msg.textContent = "Saving to cloud…";
    msg.className = "modal-msg";
    try {
      const res = await window.cloud.saveVisit(visitPayload());
      if (res.error) {
        msg.textContent = "Couldn't save to cloud — visit kept on this device. " + res.error;
        msg.className = "modal-msg error";
      } else {
        // Saved. Finishing a visit clears the screen so the next house starts
        // blank (this replaces the old "New visit" button). Keep the tech's
        // name (stored separately). Only clears on a SUCCESSFUL save.
        surveyModal.close();
        save(blank());
        rebuild();
        goHome();
        toast(res.degraded
          ? "✓ Visit saved. (Dates/temps sync once the DB update is applied.)"
          : "✓ Visit saved — ready for the next house.", "ok");
      }
    } finally {
      sendBtn.disabled = false;
    }
  });

  // ---- House picker sidebar ----
  const sidebar = document.getElementById("sidebar");
  const sideBackdrop = document.getElementById("sideBackdrop");

  // Rebuild the checklist (used when the selected house changes, since house
  // tailoring affects which items render). State is preserved via localStorage.
  function rebuild() { build(); hydrate(); refreshDueInfo(); }

  function renderHouseList() {
    const filter = document.getElementById("houseSearch").value.trim().toLowerCase();
    const cur = currentHouse();
    const rows = [`<button type="button" class="house-btn none${cur ? "" : " sel"}" data-house="">(no house — full checklist)</button>`];
    ALL_HOUSES
      .filter(h => !filter || h.name.toLowerCase().includes(filter))
      .forEach(h => {
        const sel = cur && cur.name === h.name ? " sel" : "";
        rows.push(`<button type="button" class="house-btn${sel}" data-house="${escAttr(h.name)}">${escHtml(h.name)}</button>`);
      });
    document.getElementById("houseList").innerHTML = rows.join("");
  }

  function renderHouseInfo() {
    const box = document.getElementById("houseInfo");
    const h = currentHouse();
    if (!h) { box.innerHTML = ""; return; }
    const rows = [`<h3>${escHtml(h.name)} — house info</h3>`];
    (ALL_CODES[h.name] || []).forEach(([label, val]) =>
      rows.push(`<div class="info-item code"><b>${escHtml(label)}</b>${escHtml(val)}</div>`));
    (h.info || []).forEach(([label, val]) =>
      rows.push(`<div class="info-item"><b>${escHtml(label)}</b>${escHtml(val)}</div>`));
    box.innerHTML = rows.join("");
  }

  function openSidebar() {
    // Always open with search collapsed and cleared, so the list starts at full
    // height and no stale filter from a previous open is silently applied.
    const search = document.getElementById("houseSearch");
    search.value = "";
    search.hidden = true;
    document.getElementById("houseSearchToggle").setAttribute("aria-expanded", "false");
    renderHouseList();
    renderHouseInfo();
    sidebar.hidden = false;
    sideBackdrop.hidden = false;
  }
  function closeSidebar() { sidebar.hidden = true; sideBackdrop.hidden = true; }

  // The search box starts hidden so the house list gets full height. Tapping
  // 🔍 reveals it and focuses it; tapping again hides it AND clears the filter
  // so the full list returns (a hidden-but-active filter would be confusing).
  function toggleHouseSearch() {
    const search = document.getElementById("houseSearch");
    const toggle = document.getElementById("houseSearchToggle");
    const show = search.hidden;
    search.hidden = !show;
    toggle.setAttribute("aria-expanded", String(show));
    if (show) {
      search.focus();
    } else {
      search.value = "";
      renderHouseList();
    }
  }

  document.getElementById("menuBtn").addEventListener("click", openSidebar);
  document.getElementById("sidebarClose").addEventListener("click", closeSidebar);
  document.getElementById("houseSearchToggle").addEventListener("click", toggleHouseSearch);
  sideBackdrop.addEventListener("click", closeSidebar);
  document.getElementById("houseSearch").addEventListener("input", renderHouseList);
  document.getElementById("houseList").addEventListener("click", e => {
    const btn = e.target.closest("[data-house]");
    if (!btn) return;
    selectHouse(btn.dataset.house);
    renderHouseList();
    renderHouseInfo();
    closeSidebar();
  });
  // Typing a house name by hand re-tailors once the field loses focus.
  document.getElementById("house").addEventListener("change", (e) => { selectHouse(e.target.value); });

  // Pick a house. Switching to a DIFFERENT house starts it fresh (answers never
  // carry across houses). If the current checklist has unsaved entries, confirm
  // first so we never silently wipe a tech's in-progress work. Then offer to
  // resume that house's saved cloud visit, if any.
  function selectHouse(name) {
    forceShowPicker = false;   // the tech answered the "which house?" picker
    const s = load();
    const curName = (s.house || "").trim().toLowerCase();
    const newName = (name || "").trim().toLowerCase();
    if (newName === curName) { rebuild(); if (name) maybeResume(name); return true; }
    const hasWork = Object.keys(s.items || {}).length > 0;
    if (hasWork && !confirm(
      `Start ${name || "the full checklist"}? This clears the current checklist` +
      `${s.house ? ` for ${s.house}` : ""}. (Tip: tap Save progress first to keep it.)`)) {
      document.getElementById("house").value = s.house || "";   // revert the picker
      return false;
    }
    const fresh = blank();
    fresh.house = name;
    save(fresh);
    rebuild();
    if (name) maybeResume(name);
    return true;
  }

  // ---- Toast + Save progress + resume ----
  function toast(text, kind) {
    let t = document.getElementById("toast");
    if (!t) { t = document.createElement("div"); t.id = "toast"; document.body.appendChild(t); }
    t.textContent = text;
    t.className = "show" + (kind ? " " + kind : "");
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.className = ""; }, 3200);
  }

  // Save an in-progress visit to the cloud so it can be resumed on another day
  // or device. Local state already persists per-device; this is the cross-device
  // buffer. Idempotent via cloudVisitId.
  document.getElementById("saveProgress").addEventListener("click", async (e) => {
    persist();
    const s = load();
    if (!(s.house || "").trim()) { toast("Pick a house first.", "error"); return; }
    if (!window.cloud) { toast("Saved on this device (cloud not loaded).", "error"); return; }
    const btn = e.currentTarget;
    btn.disabled = true;
    toast("Saving progress…");
    try {
      const res = await window.cloud.saveVisit(visitPayload(), "in_progress");
      if (res.error) { toast("Saved on this device only. " + res.error, "error"); }
      else {
        const s2 = load(); s2.cloudVisitId = res.visitId; save(s2);
        toast(res.degraded
          ? "✓ Progress saved. (Dates/temps sync once the DB update is applied.)"
          : "✓ Progress saved — resume it on any device.", "ok");
      }
    } finally { btn.disabled = false; }
  });

  // Replace the on-screen visit with one loaded from the cloud.
  function applyCloudVisit(v) {
    const s = load();
    s.house = v.house || s.house;
    s.date = v.date || s.date;
    s.counts = v.counts || {};
    s.survey = v.survey || {};
    s.items = v.items || {};
    s.cloudVisitId = v.visitId;
    save(s);
    rebuild();
  }

  // After picking a house, offer to resume an in-progress cloud visit for it.
  async function maybeResume(houseName) {
    if (!window.cloud || !(houseName || "").trim()) return;
    let inProg;
    try { inProg = await window.cloud.loadInProgress(houseName); } catch { return; }
    if (!inProg) return;
    const s = load();
    if (s.cloudVisitId && s.cloudVisitId === inProg.visitId) return;   // already on it
    const when = inProg.date ? " from " + fmtDate(inProg.date) : "";
    const hasLocalWork = Object.keys(s.items || {}).length > 0
      && (s.house || "").trim().toLowerCase() === houseName.trim().toLowerCase();
    const msg = hasLocalWork
      ? `There's a saved in-progress visit for ${houseName}${when} in the cloud. Load it? This replaces what's on the screen now.`
      : `Resume your in-progress visit for ${houseName}${when}?`;
    if (confirm(msg)) applyCloudVisit(inProg);
  }
  window.maybeResume = maybeResume;

  // ---- House Notes screen ----
  // #notes            → house picker
  // #notes/<name>     → that house's notes (name is encodeURIComponent'd)
  function notesHouseFromHash() {
    const m = location.hash.match(/^#notes\/(.+)$/);
    if (!m) return null;
    const name = decodeURIComponent(m[1]).trim().toLowerCase();
    return ALL_HOUSES.find(h => h.name.toLowerCase() === name) || null;
  }

  // Human-readable label for each house.notes key, so House Notes can show
  // ALL recorded notes — not just the ones that happen to have a matching,
  // currently-visible checklist item (equipment flags hide items, which used
  // to silently hide their notes too).
  const NOTE_KEY_LABELS = {
    fireExtinguishers: "Fire extinguishers",
    furnaceFilter: "Furnace filter",
    fridgeCoils: "Refrigerator coils",
    waterSoftener: "Water softener",
    shutoffs: "Gas & water shutoffs",
    knives: "Sharpen knives",
    medLock: "Med lock",
    atticAccess: "Attic access",
    dryerVents: "Dryer vents",
  };

  // Every editable house fact as a "field row": info pairs + item notes,
  // PLUS rows for pending suggestions/denials whose key has no official
  // value yet (a proposed addition still needs somewhere to show).
  function fieldRowsForHouse(house, res) {
    const rows = new Map();   // "target key" → row
    const put = (target, key, text) => {
      const label = target === "item" ? (NOTE_KEY_LABELS[key] || key) : key;
      rows.set(target + " " + key, { target, key, label, text });
    };
    (house.info || []).forEach(([label, val]) => put("info", label, val));
    Object.entries(house.notes || {}).filter(([, t]) => t)
      .forEach(([k, t]) => put("item", k, t));
    if (res && !res.error && !res.notReady) {
      res.suggestions.concat(res.denials || []).forEach(s => {
        if (s.target !== "general" && !rows.has(s.target + " " + s.noteKey))
          put(s.target, s.noteKey, "");
      });
    }
    return [...rows.values()];
  }

  // One pending suggestion, with role-appropriate actions. Shared by the
  // notes screen, the checklist inline notes, and the pending queue.
  function sugBlockHTML(s, opts) {
    const isAdmin = window.cloud && window.cloud.role === "supervisor";
    const what = s.action === "delete"
      ? `<p class="sug-text no-note">Proposes removing this note</p>`
      : `<p class="sug-text">${escHtml(s.text)}</p>`;
    const current = opts && opts.current !== undefined
      ? `<p class="sug-current">Current: ${opts.current ? escHtml(opts.current) : "(none)"}</p>` : "";
    return `
      <div class="sug" data-sug-id="${escAttr(s.id)}">
        <div class="sug-meta">⏳ Awaiting approval — ${escHtml(s.authorName)}${s.createdAt ? " · " + fmtDate(s.createdAt.slice(0, 10)) : ""}</div>
        ${what}${current}
        <div class="sug-actions">
          ${isAdmin ? `<button type="button" class="btn-primary" data-sug-approve="${escAttr(s.id)}">✓ Approve</button>
                       <button type="button" data-sug-deny="${escAttr(s.id)}">✕ Deny…</button>` : ""}
          ${s.mine ? `<button type="button" class="btn-danger" data-sug-withdraw="${escAttr(s.id)}">Withdraw</button>` : ""}
        </div>
        <div class="deny-form" data-deny-form="${escAttr(s.id)}" hidden>
          <input type="text" data-deny-reason="${escAttr(s.id)}" placeholder="Reason — the tech will see this (optional)" aria-label="Reason for denying this suggestion">
          <button type="button" class="btn-danger" data-deny-confirm="${escAttr(s.id)}">Deny</button>
          <button type="button" data-deny-cancel="${escAttr(s.id)}">Cancel</button>
        </div>
      </div>`;
  }

  // The author's ❌ notice for a denied suggestion (until they dismiss it).
  function denialBlockHTML(d) {
    return `
      <div class="denied" role="status">
        ❌ <b>Denied</b>${d.denyReason ? " — " + escHtml(d.denyReason) : ""}
        <span class="denied-text">Your suggestion: ${d.action === "delete" ? "remove this note" : escHtml(d.text)}</span>
        <button type="button" data-denied-dismiss="${escAttr(d.id)}">Dismiss</button>
      </div>`;
  }

  // One field row: official value + ✎ + its pending/denied blocks.
  // (The ✎ edit control itself is wired in the next task.)
  function fieldRowHTML(row, res) {
    const isAdmin = window.cloud && window.cloud.role === "supervisor";
    const canCloud = !!(window.cloud && res && !res.error && !res.notReady);
    const sugs = canCloud ? res.suggestions.filter(s => s.target === row.target && s.noteKey === row.key) : [];
    const dens = canCloud ? (res.denials || []).filter(d => d.target === row.target && d.noteKey === row.key) : [];
    const editing = fieldEditor && fieldEditor.mode === "edit"
      && fieldEditor.target === row.target && fieldEditor.key === row.key;
    const editBtn = canCloud && !editing
      ? `<button type="button" class="field-edit-btn" data-field-edit
           data-target="${escAttr(row.target)}" data-key="${escAttr(row.key)}"
           aria-label="${isAdmin ? "Edit" : "Suggest a fix to"} the ${escAttr(row.label)} note"><span aria-hidden="true">✎</span></button>`
      : "";
    return `<div class="notes-item"><b>${escHtml(row.label)}</b><span>${row.text ? escHtml(row.text) : `<span class="no-note">(no note yet)</span>`}</span>${editBtn}
      ${editing ? fieldEditorHTML(row.target, row.key, row.label, row.text) : ""}
      ${sugs.map(s => sugBlockHTML(s)).join("")}
      ${dens.map(denialBlockHTML).join("")}
    </div>`;
  }

  // The whole editable-fields section: door codes (read-only, on-device data)
  // then every field row, then the add buttons (wired in the next task).
  function houseFieldsHTML(house, res) {
    const rows = [];
    (ALL_CODES[house.name] || []).forEach(([label, val]) =>
      rows.push(`<div class="notes-item"><b>${escHtml(label)}</b>${escHtml(val)}</div>`));
    fieldRowsForHouse(house, res).forEach(row => rows.push(fieldRowHTML(row, res)));
    const body = rows.length ? rows.join("")
      : `<p class="screen-sub">No notes recorded for this house.</p>`;
    return `<h2>House notes</h2>${body}${addControlsHTML(house, res)}
      <p class="notes-msg" id="fieldsMsg" role="status"></p>`;
  }

  // Editors land in the next commit; render nothing until then.
  function fieldEditorHTML(target, key, label, currentText) { return ""; }
  function addControlsHTML(house, res) { return ""; }

  let notesEditorOpen = false;   // reset on each house render
  let lastNotesRes = null;   // last getHouseNotes result for the open house
  let fieldEditor = null;    // { mode: 'edit'|'add-item'|'add-info', target?, key? }
  async function renderNotesScreen() {
    const body = document.getElementById("notesBody");
    const house = notesHouseFromHash();
    if (!house) {
      body.innerHTML = `
        <input type="search" id="notesSearch" placeholder="Type the house name…" aria-label="Search houses">
        <div id="notesPickList">${notesPickListHTML("")}</div>`;
      return;
    }
    notesEditorOpen = false;
    fieldEditor = null;
    lastNotesRes = null;
    body.innerHTML = `
      <div class="screen-head" style="margin-top:0"><h1 style="font-size:1rem">${escHtml(house.name)}</h1></div>
      <div class="notes-sec" id="houseFieldsSec">${houseFieldsHTML(house, null)}</div>
      <div class="notes-sec" id="genNotesSec"><h2>General notes</h2>
        <p class="screen-sub">Loading…</p></div>`;
    if (!window.cloud) {
      document.getElementById("genNotesSec").innerHTML =
        `<h2>General notes</h2><p class="screen-sub">Cloud isn't loaded — general notes need a connection.</p>`;
      return;
    }
    await refreshNotesData();
  }

  // (Re)fetch and repaint BOTH notes sections. On any failure we do NOT
  // re-render, so a tech's typed text is never wiped.
  async function refreshNotesData() {
    const house = notesHouseFromHash();
    if (!house || !window.cloud) return;
    const res = await window.cloud.getHouseNotes(house.name);
    // The hash may have changed while we awaited; don't paint a stale house.
    if (notesHouseFromHash()?.name !== house.name) return;
    const fields = document.getElementById("houseFieldsSec");
    const gen = document.getElementById("genNotesSec");
    if (!fields || !gen) return;
    if (res.error || res.notReady) {
      const msg = document.getElementById("notesMsg") || document.getElementById("fieldsMsg");
      if (msg) {
        msg.textContent = res.notReady
          ? "Note suggestions aren't set up in the database yet (migration 0006/0008)."
          : "Couldn't load notes — " + res.error;
        msg.className = "notes-msg error";
      }
      return;
    }
    lastNotesRes = res;
    // Look the house up FRESH — approve/save refreshes ALL_HOUSES behind us.
    const fresh = notesHouseFromHash();
    fields.innerHTML = houseFieldsHTML(fresh, res);
    gen.innerHTML = genNotesHTML(fresh, res);
  }

  // Repaint only the fields section from cached data (open/close editors).
  function repaintFields() {
    const house = notesHouseFromHash();
    const sec = document.getElementById("houseFieldsSec");
    if (house && sec) sec.innerHTML = houseFieldsHTML(house, lastNotesRes);
  }

  function notesPickListHTML(filter) {
    const f = (filter || "").trim().toLowerCase();
    const matches = ALL_HOUSES.filter(h => !f || h.name.toLowerCase().includes(f));
    if (!matches.length) return `<p class="pick-none">No house matches "${escHtml(filter)}".</p>`;
    return matches.map(h =>
      `<button type="button" class="list-btn" data-notes-house="${escAttr(h.name)}">${escHtml(h.name)}</button>`).join("");
  }

  function genNotesHTML(house, res) {
    const isAdmin = window.cloud && window.cloud.role === "supervisor";
    const noteHtml = res.generalNotes
      ? `<p class="gen-notes">${escHtml(res.generalNotes)}</p>`
      : `<p class="gen-notes empty">No general notes yet.</p>`;
    const sugs = res.suggestions.filter(s => s.target === "general")
      .map(s => sugBlockHTML(s)).join("");
    const dens = (res.denials || []).filter(d => d.target === "general")
      .map(denialBlockHTML).join("");
    const editor = notesEditorOpen ? `
      <textarea id="notesEditor" aria-label="${isAdmin ? "Edit general notes" : "Suggest an update to the general notes"}">${escHtml(res.generalNotes)}</textarea>
      <div class="notes-actions">
        <button type="button" class="btn-primary" data-notes-submit="${escAttr(house.name)}">${isAdmin ? "Save notes" : "Submit suggestion"}</button>
        <button type="button" data-notes-cancel>Cancel</button>
      </div>` : `
      <div class="notes-actions">
        <button type="button" data-notes-edit>${isAdmin ? "✎ Edit notes" : "✎ Suggest an update"}</button>
      </div>`;
    return `<h2>General notes</h2>${noteHtml}${sugs}${dens}${editor}
      <p class="notes-msg" id="notesMsg" role="status"></p>`;
  }

  document.getElementById("notesBody").addEventListener("input", e => {
    if (e.target.id === "notesSearch") {
      document.getElementById("notesPickList").innerHTML = notesPickListHTML(e.target.value);
    }
  });
  document.getElementById("notesBody").addEventListener("click", async e => {
    const pick = e.target.closest("[data-notes-house]");
    if (pick) { location.hash = "#notes/" + encodeURIComponent(pick.dataset.notesHouse); return; }
    if (e.target.closest("[data-notes-edit]")) { notesEditorOpen = true; refreshNotesData(); return; }
    if (e.target.closest("[data-notes-cancel]")) { notesEditorOpen = false; refreshNotesData(); return; }
    const submit = e.target.closest("[data-notes-submit]");
    if (submit) { await submitNotes(submit.dataset.notesSubmit, submit); return; }
    if (await sugClickActions(e, refreshNotesData)) return;
  });

  async function submitNotes(houseName, btn) {
    const ta = document.getElementById("notesEditor");
    const msg = document.getElementById("notesMsg");
    const text = ta.value;   // deliberate: allow clearing a note to empty
    const isAdmin = window.cloud && window.cloud.role === "supervisor";
    if (!isAdmin && !text.trim()) {
      msg.textContent = "Type your suggested note first."; msg.className = "notes-msg error"; return;
    }
    btn.disabled = true;
    msg.textContent = isAdmin ? "Saving…" : "Submitting…"; msg.className = "notes-msg";
    try {
      const res = isAdmin
        ? await window.cloud.saveGeneralNotes(houseName, text)
        : await window.cloud.suggestNote(houseName, text, loadName());
      if (res.error) {   // keep the textarea + its content so nothing is lost
        msg.textContent = "Couldn't save — " + res.error; msg.className = "notes-msg error";
        return;
      }
      notesEditorOpen = false;
      toast(isAdmin ? "✓ Notes saved." : "✓ Suggestion submitted for approval.", "ok");
      await refreshNotesData();
    } finally { btn.disabled = false; }
  }

  async function sugAction(fn, okText, btn, refresh) {
    // Show errors NEXT TO the control that caused them: the clicked button's
    // own section's .notes-msg (#notesMsg or #fieldsMsg). No .notes-sec
    // ancestor (future checklist/queue contexts) → undefined → toast fallback.
    const msg = btn.closest(".notes-sec")?.querySelector(".notes-msg");
    btn.disabled = true;
    try {
      const res = await fn();
      if (res.error) {
        if (msg) { msg.textContent = res.error; msg.className = "notes-msg error"; }
        else toast("Couldn't do that — " + res.error, "error");
        return;
      }
      toast("✓ " + okText, "ok");
      await (refresh || refreshNotesData)();
      refreshPendingBadge();
    } finally { btn.disabled = false; }
  }

  // Approve / deny(+reason) / withdraw / dismiss-denial, wherever suggestion
  // blocks render (notes screen, checklist, pending queue). Returns true if
  // the click was one of ours.
  async function sugClickActions(e, refresh) {
    const openDeny = e.target.closest("[data-sug-deny]");
    if (openDeny) {
      const f = document.querySelector(`[data-deny-form="${CSS.escape(openDeny.dataset.sugDeny)}"]`);
      if (f) { f.hidden = false; f.querySelector("input").focus(); }
      return true;
    }
    const cancelDeny = e.target.closest("[data-deny-cancel]");
    if (cancelDeny) {
      const id = cancelDeny.dataset.denyCancel;
      const f = document.querySelector(`[data-deny-form="${CSS.escape(id)}"]`);
      if (f) f.hidden = true;
      document.querySelector(`[data-sug-deny="${CSS.escape(id)}"]`)?.focus();
      return true;
    }
    const confirmDeny = e.target.closest("[data-deny-confirm]");
    if (confirmDeny) {
      const id = confirmDeny.dataset.denyConfirm;
      const reason = (document.querySelector(`[data-deny-reason="${CSS.escape(id)}"]`)?.value || "").trim();
      await sugAction(() => window.cloud.denySuggestion(id, reason),
        "Denied — the tech will see this.", confirmDeny, refresh);
      return true;
    }
    const approve = e.target.closest("[data-sug-approve]");
    if (approve) {
      await sugAction(() => window.cloud.approveSuggestion(approve.dataset.sugApprove),
        "Approved — the note is updated.", approve, refresh);
      return true;
    }
    const withdraw = e.target.closest("[data-sug-withdraw]");
    if (withdraw) {
      await sugAction(() => window.cloud.withdrawSuggestion(withdraw.dataset.sugWithdraw),
        "Suggestion withdrawn.", withdraw, refresh);
      return true;
    }
    const dismiss = e.target.closest("[data-denied-dismiss]");
    if (dismiss) {
      await sugAction(() => window.cloud.markDenialSeen(dismiss.dataset.deniedDismiss),
        "Cleared.", dismiss, refresh);
      return true;
    }
    return false;
  }

  // Supervisor home-screen badge. Harmless no-op for techs / signed-out.
  async function refreshPendingBadge() {
    if (!window.cloud || window.cloud.role !== "supervisor" || !window.cloud.pendingCount) return;
    const r = await window.cloud.pendingCount();
    if (!r.error && window.applyPendingCount) window.applyPendingCount(r.count);
  }

  // ---- Screens & hash router ----
  // The hash is the single source of truth for which screen shows, so the
  // phone's back button moves between screens instead of leaving the app.
  //   #home  #visit  #continue  #notes  #notes/<house name>
  function currentScreenFromHash() {
    const h = location.hash;
    if (h.startsWith("#visit")) return "visit";
    if (h.startsWith("#notes")) return "notes";
    if (h.startsWith("#continue")) return "continue";
    if (h.startsWith("#routes")) return "routes";
    return "home";
  }
  function showScreen() {
    const scr = currentScreenFromHash();
    document.body.dataset.screen = scr;
    if (scr === "continue") renderContinue();
    if (scr === "routes") renderRoutesScreen();
    if (scr === "notes" && typeof renderNotesScreen === "function") renderNotesScreen();
  }
  function goHome() { location.hash = "#home"; }
  window.addEventListener("hashchange", showScreen);
  document.addEventListener("click", e => {
    if (e.target.closest("[data-nav-home]")) goHome();
  });

  // Home buttons. "New" forces the up-front picker even if a house is already
  // on screen; actually SWITCHING houses still goes through selectHouse()'s
  // confirm, so in-progress work is never silently wiped.
  let forceShowPicker = false;
  document.getElementById("homeNewVisit").addEventListener("click", () => {
    forceShowPicker = true;
    pickerDismissed = false;
    pickerShowAll = false;
    location.hash = "#visit";
    rebuild();
  });
  document.getElementById("homeContinue").addEventListener("click", () => {
    location.hash = "#continue";
  });
  document.getElementById("homeNotes").addEventListener("click", () => {
    location.hash = "#notes";
  });
  document.getElementById("homeRoutes").addEventListener("click", () => {
    location.hash = "#routes";
  });

  // ---- Continue screen ----
  async function renderContinue() {
    const box = document.getElementById("continueList");
    const s = load();
    const rows = [];
    // Work sitting on THIS device (may or may not also be saved to the cloud).
    if ((s.house || "").trim() && Object.keys(s.items || {}).length) {
      const n = Object.keys(s.items).length;
      rows.push(`<button type="button" class="list-btn" data-resume-local="1">
        ${escHtml(s.house)} <small>On this device · ${n} item${n === 1 ? "" : "s"} filled in${s.date ? " · " + fmtDate(s.date) : ""}</small></button>`);
    }
    box.innerHTML = rows.join("") + `<p class="screen-sub">Checking the cloud…</p>`;
    let cloudRows = null;
    if (window.cloud) cloudRows = await window.cloud.listInProgress();
    let cloudHtml = "";
    if (cloudRows === null) {
      cloudHtml = `<p class="screen-sub">Couldn't reach the cloud — showing this device only.</p>`;
    } else {
      const localId = s.cloudVisitId || null;
      cloudRows
        .filter(v => v.visitId !== localId)   // already listed as the local row
        .forEach(v => {
          cloudHtml += `<button type="button" class="list-btn" data-resume-cloud="${escAttr(v.houseName)}">
            ${escHtml(v.houseName)} <small>Saved to cloud · ${v.itemCount} item${v.itemCount === 1 ? "" : "s"}${v.date ? " · " + fmtDate(v.date) : ""}</small></button>`;
        });
    }
    if (!rows.length && !cloudHtml.includes("list-btn")) {
      cloudHtml += `<p class="screen-sub">Nothing in progress.</p>
        <button type="button" class="home-btn" id="continueStartNew">🏠 Start a new house visit</button>`;
    }
    box.innerHTML = rows.join("") + cloudHtml;
    const startNew = document.getElementById("continueStartNew");
    if (startNew) startNew.addEventListener("click", () =>
      document.getElementById("homeNewVisit").click());
  }
  document.getElementById("continueList").addEventListener("click", async e => {
    if (e.target.closest("[data-resume-local]")) { location.hash = "#visit"; return; }
    const cloudBtn = e.target.closest("[data-resume-cloud]");
    if (!cloudBtn) return;
    const houseName = cloudBtn.dataset.resumeCloud;
    // selectHouse owns the "don't wipe unsaved work" confirm; it also offers
    // the cloud resume itself (maybeResume) once the house is active.
    if (selectHouse(houseName)) location.hash = "#visit";
  });

  // ---- Routes screen (supervisor) ----
  // Top: each route's name + which tech runs it (the one-dropdown turnover).
  // Bottom: which route each house is on. UI-gated to supervisors; RLS is the
  // real enforcement, so a tech who forces the hash just gets failed writes.
  async function renderRoutesScreen() {
    const body = document.getElementById("routesBody");
    if (!window.cloud || window.cloud.role !== "supervisor") {
      body.innerHTML = `<p class="screen-sub">This screen is for supervisors.</p>`;
      return;
    }
    body.innerHTML = `<p class="screen-sub">Loading…</p>`;
    const [routesRes, techsRes] = await Promise.all([
      window.cloud.listRoutes(), window.cloud.listTechs(),
    ]);
    if (currentScreenFromHash() !== "routes") return;   // navigated away meanwhile
    if (routesRes.error) {
      body.innerHTML = `<p class="screen-sub">${routesRes.notReady
        ? "Routes aren't set up in the database yet — run migration 0007 in the dashboard."
        : "Couldn't load routes — " + escHtml(routesRes.error)}</p>`;
      return;
    }
    const routes = routesRes.routes;
    const techs = techsRes.techs || [];
    const techName = t => t.full_name || "(name not set — fill full_name in profiles)";
    const routeRows = routes.map(r => `
      <div class="route-row" data-route-id="${escAttr(r.id)}">
        <input type="text" value="${escAttr(r.name)}" aria-label="Route name">
        <select aria-label="Tech assigned to ${escAttr(r.name)}">
          <option value="">— no tech —</option>
          ${techs.map(t => `<option value="${escAttr(t.id)}"${t.id === r.tech_id ? " selected" : ""}>${escHtml(techName(t))}</option>`).join("")}
        </select>
        <button type="button" data-route-save>Save</button>
      </div>`).join("");
    const routeOpts = h => `<option value="">— no route —</option>` +
      routes.map(r => `<option value="${escAttr(r.id)}"${r.id === h.routeId ? " selected" : ""}>${escHtml(r.name)}</option>`).join("");
    const houseRows = window.cloud.listHousesForRoutes().map(h => `
      <div class="house-route-row"><b>${escHtml(h.name)}</b>
        <select data-house-route="${escAttr(h.id)}" aria-label="Route for ${escAttr(h.name)}">${routeOpts(h)}</select>
      </div>`).join("");
    const previewSec = `
      <div class="notes-sec"><h2>Preview as tech</h2>
        <p class="screen-sub">See the app the way a route's tech sees it. Look only — you stay signed in as yourself.</p>
        <div class="route-row">
          <select id="previewRouteSel" aria-label="Route to preview">
            ${routes.map(r => `<option value="${escAttr(r.id)}">${escHtml(r.name)}</option>`).join("")}
          </select>
          <button type="button" data-preview-start>Preview</button>
        </div></div>`;
    body.innerHTML = previewSec + `
      <div class="notes-sec"><h2>Routes &amp; techs</h2>
        <p class="screen-sub">Turnover = change a route's tech and Save. Houses follow the route.</p>
        ${routeRows}
        ${techsRes.error ? `<p class="screen-sub">Couldn't load techs — ${escHtml(techsRes.error)}</p>` : ""}</div>
      <div class="notes-sec"><h2>Houses on each route</h2>
        <p class="screen-sub">Changes save immediately.</p>${houseRows}</div>`;
  }

  document.getElementById("routesBody").addEventListener("click", async e => {
    if (e.target.closest("[data-preview-start]")) {
      const sel = document.getElementById("previewRouteSel");
      const routeName = sel.options[sel.selectedIndex].textContent;
      // An empty route yields an empty Set — the picker then shows the same
      // "no houses assigned" message + Show-all button a real tech would see.
      const houses = window.cloud.listHousesForRoutes()
        .filter(h => h.routeId === sel.value)
        .map(h => h.name.trim().toLowerCase());
      startPreview(routeName, new Set(houses));
      return;
    }
    const btn = e.target.closest("[data-route-save]");
    if (!btn) return;
    const row = btn.closest("[data-route-id]");
    const name = row.querySelector("input").value.trim();
    if (!name) { toast("Route name can't be empty.", "error"); return; }
    btn.disabled = true;
    const res = await window.cloud.saveRoute(row.dataset.routeId,
      { name, techId: row.querySelector("select").value || null });
    btn.disabled = false;
    if (res.error) { toast("Couldn't save — " + res.error, "error"); return; }
    toast("✓ Route saved.", "ok");
  });

  document.getElementById("routesBody").addEventListener("change", async e => {
    const sel = e.target.closest("[data-house-route]");
    if (!sel) return;
    sel.disabled = true;
    const res = await window.cloud.setHouseRoute(sel.dataset.houseRoute, sel.value || null);
    sel.disabled = false;
    if (res.error) { toast("Couldn't save — " + res.error, "error"); return; }
    toast("✓ Saved.", "ok");
  });

  if (!location.hash) history.replaceState(null, "", "#home");
  showScreen();

  rebuild();

  // Register the service worker so the app is installable and opens offline.
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
  }
</script>

<script type="module" src="cloud.js"></script>

</body>
</html>
